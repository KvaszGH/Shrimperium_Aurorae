 #Missions
 fkn_white_gold_mission_title: "§OWHITE GOLD§!"
 fkn_white_gold_mission_desc: ""
 fkn_the_long_wait_title: "An Aging in Oak"
 fkn_the_long_wait_desc: "Much as we gnash our teeth in anxiety or wither from suspense, the wine must age on its own due time inside the barrels we prepared for it. We can do nought but wait..."
 fkn_luxury_glassworks_title: "Worthy Glassware"
 fkn_luxury_glassworks_desc: "Our magnum opus can only be decanted from the finest of glassware. No expense shall be spared in creating the most luxurious of bottles!"
 fkn_second_harvest_title: "The Second Harvest"
 fkn_second_harvest_desc: "We can only pray that this harvest turns out better than the previous..."
 fkn_tending_the_vintage_title: "Tending the Vintage"
 fkn_tending_the_vintage_desc: "Clearly, our prior failure was due to not taking care of the vineyards sufficiently attentively. By tending the vines day and night without fail, perhaps they can be coaxed into finally yielding their divine bounty."
 fkn_finest_oaks_title: "Finest Oak Barrels"
 fkn_finest_oaks_desc: "As we prepare for the arrival of our masterwork vintage, we must also prepare the finest of barrels to contain this ambrosia. Only the best shall suffice."
 fkn_international_brand_title: "International Branding"
 fkn_international_brand_desc: "Our White Gold shall be renown around the world as the only acceptable wine to grace the lips of the wealthy and powerful. Even the Voice of God, or the Prince of the Aurora in Antioch, or the Celestial Emperor in distant Cathay, shall not be immune to its charms. When even divine figures sing praises of the White Gold, only then shall we be satisfied."
 fkn_developed_white_gold_tt: "Has developed the §OWhite Gold§!"
 fkn_monopolize_wine_trade_title: "Monopolize Wine Trade"
 fkn_monopolize_wine_trade_desc: "We must protect the brand of the White Gold. Only merchants under our flag paying our taxes may trade in it!"
 fkn_swiss_investment_tt: "Every §YSwiss§! province in the §YRomandie§! and §YSwitzerland§! states will gain a major §GForeign Direct Investment§! modifier and §G1/1/1 development§!!"
 fkn_aid_development_title: "Developmental Aid"
 fkn_aid_development_desc: "Our new Swiss subjects could use our aid in developing their nation to truly become the Bulwark of the South."
 fkn_strategic_alliance_title: "Strategic Allegiance"
 fkn_strategic_alliance_desc: "Our investment in our Swiss friends has paid off. It is time to collect."
 fkn_prepare_delegation_title: "Prepare a Delegation"
 fkn_prepare_delegation_desc: "We shall send our best diplomats and the finest wine as gifts to the courts of the Swiss. Surely, we can secure ourselves a friend amongst their ranks?"
 fkn_secure_italian_border_title: "Secure Italian Border"
 fkn_secure_italian_border_desc: "We shall secure the border to Italy, so no marauding mercenary band or invading Xizho army can penetrate our defences."
 fkn_scattered_guerillas_title: "Crush the Guerillas"
 fkn_scattered_guerillas_desc: "Those who resist our rule must die! This is the truth that the headstrong rebels shall learn."
 fkn_alpine_campaign_title: "Alpine Campaign"
 fkn_alpine_campaign_desc: "The Alps shall fall under our rule. Of this, there shall be no questions!"
 fkn_eyes_on_the_mountains_title: "Eyes on the Mountains"
 fkn_eyes_on_the_mountains_desc: "The Alps are truly the best defence of the German plains from invaders to the south. To trust it to anyone other than ourselves would be pure folly; thus we must justify our rightful possession of these strategic strongholds."
 fkn_back_to_business_title: "Back to Business"
 fkn_back_to_business_desc: "Business is booming!"
 fkn_new_paulaner_title: "The New Paulaner"
 fkn_new_paulaner_desc: "Bringing to the world a new brand of beer: the Paulaner! Brewed from the finest of Bavarian grain, under proper Franconian oversight, the world shall be taken by storm!"
 fkn_2_years_beer_income_reward_tt: "We will earn 2 years of production income from §YBeer§!."
 fkn_rejuvenate_the_fields_title: "Rejuvenate the Fields"
 fkn_rejuvenate_the_fields_desc: "In order to brew large amounts of beer, we must rejuvenate the wheat fields that have long been devastated by war."
 fkn_recovering_secret_formula_title: "Recovering the Secret Formula"
 fkn_recovering_secret_formula_desc: "Now that the pesky hoarders have been dealt with, we can begin to study their breweries to reverse engineer the secret formula they used to brew their beer. To the most talented vintners this world has ever seen, surely this will not be an insurmountable hurdle!"
 fkn_appropriate_breweries_title: "Appropriate the Breweries"
 fkn_appropriate_breweries_desc: "Beer is a huge business. It would be greatly beneficial to us to have better control over the industry."
 fkn_question_of_alps_title: "Alpine Question"
 fkn_question_of_alps_desc: "The mountains now to our south are imposing, grand, and defensible. To invade them would be difficult, but to defend them would be a great strategic victory..."
 fkn_choose_path_tt: "Our choice of §Yadvisor type§! in completing this mission will determine whether we unlock the §Gdiplomatic§! or §Rmilitary§! path for handling the §YAlpine States§!."
 fkn_assert_suzerainty_title: "Assert Suzerainty"
 fkn_assert_suzerainty_desc: "To those who follow our laws and respect our mutual agreements, there shall only ever be peace and prosperity. To those who would defy our just and wise rule, there shall only ever be ruination and death. Thus is the way."
 fkn_city_no_more_title: "Free City No More"
 fkn_city_no_more_desc: "No more are we merely a free city or petty lordship in the center of Germany, surrounded by stronger neighbors. Though we do not forget our roots, we have clearly risen to become so much more."
 fkn_crush_bavarian_spirit_title: "Crush Bavarian Spirit"
 fkn_crush_bavarian_spirit_desc: "There is nothing better than a good Triumphal Procession through every inch of Bavarian soil to remind them of who is now in control!"
 fkn_building_new_cellars_title: "Building New Cellars"
 fkn_building_new_cellars_desc: "Good wine requires good cellars to mature."
 fkn_2_years_wine_income_reward_tt: "We will earn 2 years of production income from §YWine§!."
 fkn_explain_vineyards_tt: "This will enable a new §YDecision§! as well as §YState Edict§! allowing us to select a province with the new §YVineyard Planting§! edict active, turning its trade good into §GWine§!!"
 fkn_surveying_new_vineyards_title: "Surveying New Vineyards"
 fkn_surveying_new_vineyards_desc: "Good wine requires good grapes to grow."
 fkn_end_bavarian_threat_title: "End the Bavarian Threat"
 fkn_end_bavarian_threat_desc: "Bavarian has always fancied itself our betters. They imagine their beer is better than our wine, their Oktoberfest is grander than our wine tastings! Today, we show them who is truly superior."
 fkn_claims_in_bavaria_title: "Claims in Bavaria"
 fkn_claims_in_bavaria_desc: "Now that we control parts of Bavaria, the rest shall soon follow."
 fkn_future_of_swabia_title: "Future of Swabia"
 fkn_future_of_swabia_desc: "Under our wise guidance, the future of Swabia is bright indeed!"
 fkn_swabia_united_title: "Swabia United"
 fkn_swabia_united_desc: "The Swabian people, once divided into numerous city-states and petty lordships just like ourselves, are now united!"
 fkn_connections_in_swabia_title: "Connections in Swabia"
 fkn_connections_in_swabia_desc: "We should establish connections in our Swabian neighbors that we may aid in their unification. Under our guidance, of course."
 fkn_united_and_indivisible_title: "United and Indivisible"
 fkn_united_and_indivisible_desc: "Once, Franconia was a land of city-states, bishoprics, and petty lordships. Now, it is a bustling state, united under one rule. The future is bright!"
 fkn_first_sowing_title: "The First Harvest"
 fkn_first_sowing_desc: "It is finally time! We shall harvest the first ever crop of our masterful wine grape!"
 fkn_vineyards_of_castell_title: "Vineyards of Castell"
 fkn_vineyards_of_castell_desc: "The vineyards of Castell must be prepared for our grand ambition."
 fkn_introducing_the_strain_title: "Introducing the New Strain"
 fkn_introducing_the_strain_desc: "With our new strain of grape ready for planting, all that remains is to introduce it to our vineyards. Ah, the anticipation!"
 fkn_expand_the_vineyards_title: "Expanding the Vineyards"
 fkn_expand_the_vineyards_desc: "More wine requires more vineyards! More grapes!"
 fkn_tradition_of_wine_title: "Tradition of Wine"
 fkn_tradition_of_wine_desc: "Franconia has an ancient tradition of growing the finest wine in the world. Well, the world may not know it yet, but 'tis true."
 fkn_nursing_our_lands_title: "Nursing Our Lands"
 fkn_nursing_our_lands_desc: "The quality of wine can be linked all the way back to the quality of the soil in which the grapes were planted. We must nurture our land to make the finest of wines."
 fkn_perfect_heist_title: "The Wine Heist"
 fkn_perfect_heist_desc: "We must devise a plan to locate where the new Alsatian grape strands are being turned into wine and steal their secrets! With the basics in hand, we can then improve on their plans and make the perfect wine."
 fkn_infiltrate_french_markets_title: "Infiltrate French Markets"
 fkn_infiltrate_french_markets_desc: "The French fancy themselves wine-makers, and snobs all over pride themselves on drinking Champagne. Pah! We shall get to the bottom of this."
 fkn_grand_capital_title: "Grand Capital of Franconia"
 fkn_grand_capital_desc: "Truly, the greatest city in the world!"
 fkn_safeguard_the_realm_title: "Safeguard the Realm"
 fkn_safeguard_the_realm_desc: "In Fortresses there is safety."
 fkn_franken_realm_title: "Realm of the Franken"
 fkn_franken_realm_desc: "Franconia stands united!"
 fkn_northern_campaign_title: "Northern Campaign"
 fkn_northern_campaign_desc: "North Franconia shall be united!"
 fkn_southern_campaign_title: "Southern Campaign"
 fkn_southern_campaign_desc: "South Franconia shall be united!"
 fkn_expand_military_facilities_title: "Expand the Quarters"
 fkn_expand_military_facilities_desc: "Our military facilities in the capital must be further expanded!"
 fkn_new_barracks_title: "New Barracks"
 fkn_new_barracks_desc: "Barracks must be built so our professional military has somewhere to live."
 fkn_bastion_of_safety_title: "Never Again Broken"
 fkn_bastion_of_safety_desc: "Never again shall an invader lay waste to our capital and pillage our people."
 fkn_refuge_for_the_faithful_title: "Refuge for the Faithful"
 fkn_refuge_for_the_faithful_desc: "We shall be a refuge for the faithful, where we protect each other from those who would do us harm."
 fkn_talented_general_title: "Recruit Talented Commander"
 fkn_talented_general_desc: "An army needs a skilled commander to lead them."
 fkn_rally_the_franken_title: "Rally the Franken"
 fkn_rally_the_franken_desc: "The Franconian people rise!"
 fkn_mandatory_military_service_title: "Mandatory Military Service"
 fkn_mandatory_military_service_desc: "We must institute a draft and begin planning a professional military not subject to the whims of seasons and levies."
 fkn_restoring_the_capital_title: "Rejuvenating the Capital"
 fkn_restoring_the_capital_desc: "Our core demesne must be rejuvenated in order to prove that our way is right."
 fkn_funds_of_the_crown_title: "Funds of the Crown"
 fkn_funds_of_the_crown_desc: "The crown requires a treasury in order to begin investments in our prosperity."
 fkn_enables_artisans_tt: "We will enable a §Gspecial estate privilege§! for the §YBurghers§! estate: §YArtisan Guilds of Franconia§!, giving §GProduction Efficiency§!"
 fkn_support_the_local_guilds_title: "Support the Local Guilds"
 fkn_support_the_local_guilds_desc: "The local guilds are the bedrock of our economic activity."
 fkn_invest_in_manufacturing_title: "Invest in Manufacturing"
 fkn_invest_in_manufacturing_desc: "Economists speak of debt and trade. But we believe in a firm foundation of production to back our commerce."
 
 # events
 ia_flavor_fkn.1.t: "News from the West"
 ia_flavor_fkn.1.d: "'Fantastic news, my lord!' The Castellan of Castell bursts into [Root.Monarch.GetName]'s office chambers, panting and out of breath. 'A new strain of grapes has been discovered in Elsaß, and our agents managed to acquire a sample of them! I reckon, with just a bit of tending and grafting, our soils could grow this specimen into the finest strain of wine grapes in all of God's creation! Just think of the possibilities!"
 ia_flavor_fkn.1.a: "Intriguing..."
 ia_flavor_fkn.2.t: "Under Cover of Darkness"
 ia_flavor_fkn.2.d: "Our plan went off without a hitch. Our infiltrators snuck into the mansion of one of the head vintners of Alsace and located a set of journals and logbooks related to their winemaking. After a close call with a candle chandelier, a weak rafter, and a guard patrol underfoot, our agents have successfully brought back the logbooks to Castell. Our High Vintner has locked himself in his laboratory with some top alchemists and winemakers and started deciphering the secrets within."
 ia_flavor_fkn.2.a: "Perfect!"
 ia_flavor_fkn.3.t: "The First Harvest"
 ia_flavor_fkn.3.d: "Disaster strikes! Our first attempt at growing the new crop has resulted in abject failure. The grapes refused to grow, many dying on the vine, the remaining being as dry and shriveled as raisins. There will be no harvest for the wine-presses this year..."
 ia_flavor_fkn.3.a: "At least we have raisins?"
 ia_flavor_fkn.4.t: "The Future Awaits!"
 ia_flavor_fkn.4.d: "At long last, the long-divided Franken people are united under one Herzog!"
 ia_flavor_fkn.4.a: "We should leverage this this to request more autonomy and tax exemptions from the King!"
 ia_flavor_fkn.4.b: "Long Live [Root.Monarch.GetName]!"
 ia_flavor_fkn.5.t: "Surveying New Soils"
 ia_flavor_fkn.5.d: "We will pick a province to change the trade goods into Wine. Pick 'Reroll' if you want to refresh the options in this event."
 ia_flavor_fkn.5.a: "Option 1"
 ia_flavor_fkn.5.b: "Option 2"
 ia_flavor_fkn.5.c: "Option 3"
 ia_flavor_fkn.5.e: "Reroll"
 ia_flavor_fkn.6.t: "§RThe Triumphal Procession§!"
 ia_flavor_fkn.6.d: "For a long time, the people of Bavaria have opposed our rule and thwarted our efforts to rule over them. Today, that is at an end. Whether by bribery, concessions, negotiations, threats, or brute force, the Bavarian spirit is no more and they shall henceforth be nought other than subjects of Franconia!"
 ia_flavor_fkn.6.a: "Long Live [Root.Monarch.GetName]!"
 ia_flavor_fkn.7.t: "§RSiezing the Bavarian Breweries§!"
 ia_flavor_fkn.7.d: "The pesky brewers of Bavaria conceal their beer formulae behind such concepts as 'trade secrets' and enrich themselves at the state's expense! This will not be tolerated any longer, now that we are in full control of the region. Send in the army to force them to hand over their secrets!"
 ia_flavor_fkn.7.a: "Who would have thought they were willing to take their secrets to the grave?"
 ia_flavor_fkn.8.t: "Recovering the Formula"
 ia_flavor_fkn.8.d: "With the thick-headed former brewers of Bavaria taking their secrets to the grave, we have had to painstakingly reverse-engineer the process by analysing the leftover facilities and fields that were relatively undamaged. Now, we have finally developed a formula that, though slightly different from the old Bavarian one, is just as good, nay, better! We call it the Paulaner Beer."
 ia_flavor_fkn.8.a: "Prost!"
 ia_flavor_fkn.9.t: "The Second Harvest"
 ia_flavor_fkn.9.d: "The grapes are painstakingly picked by hand and transported into the wineries by basket. The High Vintner watches the entire process with bated breath, occassionally selecting random grapes for inspection of both texture and taste. All await the verdict..."
 ia_flavor_fkn.9.a: "These grapes show promise!"
 ia_flavor_fkn.10.t: "Moment of Truth"
 ia_flavor_fkn.10.d: "As the crowd waits in silent anticipation, the High Vintner ceremoniously cracks open the very first barrel ever of what is to perhaps, hopefully, it must, become our magnum opus of wine. They take a sip. Time slows to a crawl..."
 ia_flavor_fkn.10.a: "IT IS DONE"
 ia_flavor_fkn.11.t: "An International Magnum Opus"
 ia_flavor_fkn.11.d: "Our White Gold has spread across the world like a wildfire of wine. Everyone who's a someone requires the White Gold at their feasts and festivities, the rich and powerful simply cannot get enough of it. Critics call it ambrosia, nectar of the heavens; anyone who has had even just one sip of it can simply no longer taste regular wine any longer. And everyone knows the name of Franconia now, for only we could have produced this wonder..."
 ia_flavor_fkn.11.a: "THE WINE MUST FLOW"
 ia_flavor_fkn.12.t: "Selection of the next High Vintner"
 ia_flavor_fkn.12.d: "As we well know, the ability to grow, appreciate, and sell good wine is crucial to being a good ruler of Franconia. It is time to select the next High Vintner who can best embody these virtues."
 ia_flavor_fkn.12.a: "The studious prince, who knows every type of grape and wine."
 ia_flavor_fkn.12.b: "The gregarious prince, who can wine and dine with the best."
 ia_flavor_fkn.12.c: "The hardworking prince, who has planted grapevines by hand."