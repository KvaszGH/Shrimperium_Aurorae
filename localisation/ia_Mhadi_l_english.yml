 #Events
 mhadi.1.title: "§RTitus 2:9§!"
 mhadi.1.desc: "Chandragupta stands at a crossroads in his campaign of holy war. As the greatest of the Mhadi, redeemers of the new jade world, the richness of the breadbasket of India lies before him. But it is spoiled. To the north, the Mamluks impose a cultural caste system dominated by a heathen Turkish aristocracy, while Kannada plots revolutions and power grabs against its neighbors. The gesture of alliances is a sham, the Mhadi knows this, loose agreements of support in conflicts that will tear themselves apart when one state emerges dominant. The faithful are persecuted, and the converters and fire preachers are scattered to places as far abroad as Pagan and Oman by the great Indian tyrants. They mislead the Indians with idolatry and false worship, of every single state and people on this whole earth. But Chandragupta dreams, of a world where the faithful conquer, and those who defile the message and refuse the invitation to the lord's room shall burn, their people scattered to all corners of the earth for a change, their hearts torn open upon Jehovah's command. Thousands of men leap to the banner, to expand the empire, to expand the faith, to die for him, the soft words of Jehovah enter Chandragupta's ears, what does he say, in chime with the voice of the son, the Buddah, and the prophet?"
 mhadi.1.a: "We must skin the sinners if they wish to skim divinity! All of India is mine!"
 mhadi.1.b: "We must not let greed cloud our piety."
 mhadi.2.title: "For Whom The Bell Tolls"
 mhadi.2.desc: "Hark! Hark! Do you hear it? The Bell tolls again. How many times shall It toll this time?"
 mhadi.2.a: "DONG"
 mhadi.2.b: "DONG DONG"
 mhadi.2.c: "DONG DONG DONG"
 mhadi.2.d: "DONG DONG DONG DONG"
 mhadi.2.e: "DONG DONG DONG DONG DONG"
 mhadi.2.f: "DONG DONG DONG DONG DONG DONG"
 mhadi.2.g: "DONG DONG DONG DONG DONG DONG DONG"
 mhadi.2.h: "DONG DONG DONG DONG DONG DONG DONG DONG"
 mhadi.2.i: "DONG DONG DONG DONG DONG DONG DONG DONG DONG"
 mhadi.2.j: "DONG DONG DONG DONG DONG DONG DONG DONG DONG DONG"
 mhadi.2.k: "DONG x11"
 mhadi.2.l: "DONG x12"
 mhadi.2.m: "SILENCE...."
 pyre_festival_explanation_tt: "All §Ynon-cored provinces§! will lose §Y1 random development§! and gain 25 §Rdevastation§!. If any such province §Ycan no longer lose any development§! or is already our religion, we will §Ggain a core§! and the province will adopt both our culture and religion. If we somehow possess provinces that are cores but NOT an accepted culture and religion, §Rthe same penalties§! will occur to said province and then it will change its culture or religion to match ours."
 mhadi.3.title: "Pyre Festival"
 mhadi.3.desc: "IT hungers. Every year, we must make offerings to assuage IT, sate ITS hunger that it not claim us yet, until the world is cleansed and we are ready to Ascend. IT desires the flesh of the conquered, of slaves whose spirits remain unbroken, of unbelievers who dare to spit in ITS face, and this flesh we offer up to IT upon the Great Pyre. §RMAY IT BE SATISFIED!§!"
 mhadi.3.a: "Disaster! We have only meagre offerings this year!"
 mhadi.3.b: "LET IT FEAST"
 mhadi.4.title: "STARTUP EXPLANATION -- README"
 mhadi.4.desc: "As the Mhadi, you are playing as an apocalyptic death cult! You cannot core provinces or send missionaries; instead you have a yearly Pyre Festival event that will burn non-core provinces. Every burnt provinces will grant 5 Fervor and some Bell Progress (your unique government mechanic leading up to the §REnd of the World§!. Once a province has been burnt to the ground, it will automatically be cored and lose all separatism. If you do not have any non-core provinces to burn, you will instead receive a debuff until the next Pyre Festival. \n\n When you reach 100 Bell Progress, the §RBell will Toll§!, resulting in you becoming §Rdismantled§!. In exchange, you gain a permanent, upgradeable bonus every time §Rthe Bell Tolls§!. After the 12th Toll, you can begin a ritual to §REnd the World§!."
 mhadi.4.a: "Understood."
 mhadi.5.title: "THE BELL TOLLS"
 mhadi.5.desc: "An inexplicable phenomenon has occured today! Across the entire realm, reports are coming in of people reportedly hearing a bell toll at exactly the same time, even when no bell was nearby. What could this mean?"
 mhadi.5.a: "DONG"
 mhadi.5.b: "DONG DONG"
 mhadi.5.c: "DONG DONG DONG"
 mhadi.5.d: "DONG DONG DONG DONG"
 mhadi.5.e: "DONG DONG DONG DONG DONG"
 mhadi.5.f: "DONG DONG DONG DONG DONG DONG"
 mhadi.5.g: "DONG DONG DONG DONG DONG DONG DONG"
 mhadi.5.h: "DONG DONG DONG DONG DONG DONG DONG DONG"
 mhadi.5.i: "DONG DONG DONG DONG DONG DONG DONG DONG DONG"
 mhadi.5.j: "DONG DONG DONG DONG DONG DONG DONG DONG DONG DONG"
 mhadi.5.k: "DONG x11"
 mhadi.5.l: "DONG x12"
 mhadi.6.title: "A Threat to the World?"
 mhadi.6.desc: "Dark tidings, O Son of Heaven! A death cult calling itself the Followers of the Jade Dragon or the Children of the Pyre has swept through India. Their apocalyptic ways threaten the stability of the world itself, and our subjects are appealing to us to take measures to defend them and the very world itself from this encroaching threat. Perhaps it is time for the sleeping dragon to wake?"
 mhadi.6.a: "They shall not desecrate one metre of the Middle Kingdom!"
 countries_ask_for_protection_tt: "Countries that feel threatened by the [@YOR.GetTag] [YOR.GetName] are likely to §Yrequest our protection§!! Additionally, we will gain §Gmajor bonuses§! while at war with them!"
 mhadi.7.title: "Appeal to the Celestial Empire?"
 mhadi.7.desc: "The threat of the Mhadi looms like the Sword of Damocles over our heads. Shall we appeal to the Celestial Emperor for protection?"
 mhadi.7.a: "Send an emissary!"
 mhadi.7.b: "No, we are strong enough alone."
 mhadi.8.title: "Request for Protection"
 mhadi.8.desc: "[@From.GetTag] [From.GetName] has sent us an emissary requesting the protection of the Middle Kingdom against the Mhadi cultists! Shall we grant their request?"
 mhadi.8.a: "Granted!"
 mhadi.8.b: "No, they are not worthy."
 mhadi.9.title: "The Pyre Templars"
 mhadi.9.desc: "IT has spoken, told the bravest among us to offer themselves to the Pyre as well. IT promises that the worthy will not be consumed, but instead emerge reborn, reforged by the Pyre into something new, something better."
 mhadi.9.a: "Ten men enter, one returns..."
 pyre_templar_spawning_tt: "From now on, successful §YPyre Festivals§! will grant one new unit of §RPyre Templars§! every time. Use them wisely! (There is a maximum limit that increases with your §RBell Level§!.)"
 pyre_templar_establishment_tt: "We can now §YEstablish the Pyre Templars§!!"
 mhadi.10.title: "§RMalachi 4:1§!"
 mhadi.10.desc: "A field of charred corpses lies before me, piles upon piles of burned wood among them, a remnant of last year's pyre festival. I wouldn't have been able to tell there ever was a bustling city here if I wasn't one of the thousands of men who broke down the unworthy fortifications and slaughtered all resistance, breaking the spirit of what once was a proud commercial hub.  Its carcass was stripped bare of everything and its resources were shipped away to feed the Chosen's grand capital, not a single grain of rice left behind for the broken populace.\n\nThis year, the Chosen of the Pyre has ordered the rest of the wicked unbelievers, dissenters, rebels and sinners be put to the stake and scorched alive, snuffing out all memories of life within the province before the invasion of the Great Mhadi. Within days of receiving the order, the corpses were piled up and new stakes were erected, remaining slaves who have not been worked to death organized, and soon, the fire rose.\n\n Ach! The beauty of that all-consuming Pyre!\n Ach! The music formed by the agonized screams of the unbelievers as they burn, burn, BURN!\n Ach, that familiar bell sound, so sweet to the soul... Wait, is it calling to me? Asking me to step into the flames? To shed this mortal coil and be reborn?"
 mhadi.10.a: "Yes... ITS Will Be Done!"
 yor_has_heard_the_call_tt: "§JWe have heard the Bell's Calling!§!"
 mhadi.11.title: "§RJoel 2:30§!"
 mhadi.11.desc: "'And I will show wonders in the heavens and on the earth, blood and fire and pillars of smoke. The sun shall be turned into darkness and the moon into blood, before the great and the terrible day of the LORD comes.'\n\n [Root.Monarch.GetName] stands in front of the greatest pyre constructed to this date. Tens of thousands of souls have been fed to this pyre, rivers of blood flow in the streets as smaller pyres billow their smoke in great columns to the sky. The sun has darkened, the moon is blood-red, the sky itself has been dyed a sickly shade of purple; all that remains is for IT to find a host!\n\nSuddenly, a realization grips [Root.Monarch.GetName]..."
 mhadi.11.a: "§RStep into the Pyre...§!"
 apostle_every_other_country_loses_2_stab_tt: "Every country that does not follow the §YJade Dragon Cult§! will §Rlose 2 stability§!!"
 mhadi.12.title: "Passing the Torch"
 mhadi.12.desc: "We must select a worthy successor to the Mhadi so the torch may eventually pass on to the next generation. Who would be best for this position?"
 mhadi.12.a: "A skilled planner"
 mhadi.12.b: "An eloquent firebrand"
 mhadi.12.c: "A talented commander"
 empire_gains_ae_vs_mhadi_tt: "Every member of the §YCelestial Hellenic Empire§! will gain §Y45§! §RAggressive Expansion§! towards the Mhadi!"
 mhadi.13.title: "The Prince of the Aurora takes notice!"
 mhadi.13.desc: "Dark tidings! A death cult calling itself the Followers of the Jade Dragon or the Children of the Pyre has swept through India, claiming us to be a sign that the world must end? Their apocalyptic ways threaten the stability of the world itself, and our subjects are appealing to us to take measures to defend them and the very world itself from this encroaching threat. Perhaps it is time to raise the banners?"
 mhadi.13.a: "This is alarming!"
 mhadi.14.title: "§RRevelation 8§!"
 mhadi.14.desc: "The first bell tolled, and there came hail and fire mixed with blood, and it was hurled down on the earth. A third of the earth was burned up, a third of the trees were burned up, and all the green grass was burned up.\nThe second bell tolled, and something like a huge mountain, all ablaze, was thrown into the sea. A third of the sea turned into blood, a third of the living creatures in the sea died, and a third of the ships were destroyed.\nThe third bell tolled, and a great star, blazing like a torch, fell from the sky on a third of the rivers and on the springs of water, a third of the waters turned bitter, and many people died from the waters that had become bitter.\nThe fourth bell tolled, and a third of the sun was struck, a third of the moon, and a third of the stars, so that a third of them turned dark. A third of the day was without light, and also a third of the night.\nThe fifth bell tolled, and a star fell from the sky to the earth, and the star was given the key to the shaft of the Abyss. When the Abyss opened, smoke rose from it like the smoke from a gigantic furnace, the sun and sky were darkened by the smoke from the Abyss..."
 mhadi.14.a: "Rejoice! For the End of Times has come!"
 end_times_explanation_tt: "If our capital is occupied at any time during this Ritual, §Rwe will cease to exist§!. Should we last §Y20 years§!, §RTHE WORLD WILL END§!!"
 yor_all_countries_share_this_tt: "§YALL COUNTRIES§! will share this modifier!"
 yor_cease_to_exist_tt: "§RWe have ceased to exist...§!"
 yor_end_the_world_tt: "§RWe can now end the world...§!"
 yor_has_completed_the_ritual_tt: "§RWe have completed the Ritual of Ending...§!"
 mhadi.15.title: "The Price to be Paid"
 mhadi.15.desc: "The §RBasilica of Ending§! stands ominously at the center of the city, the final destination of every River of Blood and siphoning the smoke of every Pyre. As the forces of the international coalition draw near, a soul-wrenching voice can be heard speaking directly into their minds. \n§RYOUR FIGHT IS FUTILE. THE END IS NIGH.§!\n The artillery roar, but neither the alchemically-etched missiles nor the blessed munitions of the Templarites can drown out the laughter being forced into every mind, and countless soldiers collapse, mind-broken. The artillery roars yet again, and finally the walls of the §RBasilica§! come crashing down, revealing the true form of the §PApostle of the Apocalypse§!\n§RWITNESS ME. DESPAIR. END.§!\n Soldiers throughout the world witness the §PApostle§! simultaneously, and all but the most pious or those carrying relics of protection claw out their own eyes as they scream in mindless anguish. Those few surviving where the §RBasilica§! once stood claw, crawl, drag, squirm, writhe their way towards the formless mass now occupying the space. Every form of holy water, blades of dispelling, litanies of cleansing, amulets of sealing, scrolls of warding pierce into the §PApostle§!, but still its voice rends mind and flesh as the former owners of these items crumble to ashes.\n§RTHE END IS INEVITABLE. STRUGGLE IS FUTILE§!\nWith these final words and the chiming of ten thousand bells, the §PApostle§! finally dissipates. It is over."
 mhadi.15.a: "We are undone!"
 mhadi.16.title: "§RRitual of Ending§!"
 mhadi.16.desc: "IT IS OVER"
 mhadi.16.a: "END THE WORLD"
 mhadi.17.title: "The Curtains Fall"
 mhadi.17.desc: "Thank you for playing."
 mhadi.17.a: "..."
 mhadi.18.title: "Rise of Banditry in [vanquisher_province.GetName]"
 mhadi.18.desc: "Our policy of stripping all conquests bare of resources has proven effective in the last years, but what do we do with the land when it's depopulated? Much of the land has resources crucial for war, and we need to extract as much of it as possible before the apocalypse to ready ourselves for The End.\nThe solution to this has been the Vanquisher system, a specialized military garrison. Vanquishers would take charge of the state administratively and militarily till all stockpiles of food and materials were shipped out and all locals culled or enslaved, after which they themselves would become the new residents of the land with expanded liberties to ensure their loyalty.\nUnfortunately, in recent years the Vanquishers of [vanquisher_province.GetName], having completed their first task of purifying the land, failed in their second task of becoming the new residents, continuing a lifestyle that can only be described as banditry and despoilation of nearby lands. While there is nothing wrong with this in and of itself, the problem is that they are despoiling the wrong lands and against orders at that.\n\n How shall we address this?"
 mhadi.18.a: "Send the enterprising Vanquishers back to despoil our enemies at their pleasure!"
 mhadi.18.b: "We must teach them a lesson about disobeying orders!"
 mhadi.19.title: "Mass Slave Revolts!"
 mhadi.19.desc: "Grave tidings! The enslaved population of our recent conquests has united together and risen up in a desperate attempt to stop us from working them to death! Reports of missing garrisons and raided armories have already arrived at the capital, we must swiftly demonstrate that the fate of the unbeliever has always and only been death!"
 mhadi.19.a: "Burn them all!"
 mhadi.20.title: "Apostle's End"
 mhadi.20.desc: "The §RBasilica of Ending§! stands ominously at the center of the city, the final destination of every River of Blood and siphoning the smoke of every Pyre. As the forces of the international coalition draw near, a soul-wrenching voice can be heard speaking directly into their minds. \n§RYOUR FIGHT IS FUTILE. THE END IS NIGH.§!\n The artillery roar, but neither the alchemically-etched missiles nor the blessed munitions of the Templarites can drown out the laughter being forced into every mind, and countless soldiers collapse, mind-broken. The artillery roars yet again, and finally the walls of the §RBasilica§! come crashing down, revealing the true form of the §PApostle of the Apocalypse§!\n§RWITNESS ME. DESPAIR. END.§!\n Soldiers throughout the world witness the §PApostle§! simultaneously, and all but the most pious or those carrying relics of protection claw out their own eyes as they scream in mindless anguish. Those few surviving where the §RBasilica§! once stood claw, crawl, drag, squirm, writhe their way towards the formless mass now occupying the space. Every form of holy water, blades of dispelling, litanies of cleansing, amulets of sealing, scrolls of warding pierce into the §PApostle§!, but still its voice rends mind and flesh as the former owners of these items crumble to ashes.\n§RTHE END IS INEVITABLE. STRUGGLE IS FUTILE§!\nWith these final words and the chiming of ten thousand bells, the §PApostle§! finally dissipates."
 mhadi.20.a: "It is finally over."
 mhadi.22.title: "Call for Aid: Mhadi Invasion"
 mhadi.22.desc: "The nation of @[From.GetTag][From.GetName] has been invaded by the omnicidal Mhadi and is calling for our aid! Their envoy argues that though we are not formally obligated to defend them, the threat from the Mhadi is universal and all civilized nations must stand together to resist their threat, or their next target might be us...."
 mhadi.22.a: "Hah! That's the most amusing thing we've heard today!"
 mhadi.22.b: "First they came for..."
 
