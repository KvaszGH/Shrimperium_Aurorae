 YOR_war_slavery: "Enslave the Vanquished"
 YOR_war_slavery_desc: "Those who dared to resist us shall be tolerated to live only as slaves. When the rivers of blood run through the provinces and the conquered live in chains, one finds that administration of conquered territories is quite simple."
 YOR_eternal_war: "Doomsday Administration"
