 YOR_total_conscription: "Approaching Apocalypse"
 YOR_total_conscription_desc: "With the Apocalypse swiftly approaching, mundane jobs like 'growing food' pale in comparison to the fight to preserve our souls eternally."
 YOR_all_for_one: "Centralization of Resources"
 YOR_all_for_one_desc: "All resources must be diverted to the capital. The undeserving have no need for food or shelter."
 YOR_glorified_zealots: "Martyrs for the Cause"
 YOR_glorified_zealots_desc: "Whether you die now or on the morrow is no concern. Glory to the martyrs, who will ascend above all when the End Times come!"
 YOR_to_the_front: "No Retreat"
 YOR_to_the_front_desc: "There can be no retreat in the face of the Apocalypse. Only the endless charge! Forwards, to death and ascension!"
 YOR_useless_forts: "Futility of Defence"
 YOR_useless_forts_desc: "Our enemies shall know the futility of their defences as we pour through their shattered walls and slaughter their children in their face. Just as no puny wall may stop the apocalypse, so shall no puny fort stand in Our way!"
 mhadi_reform: "Realm of the Great Mhadi"
 mhadi_reform_desc: "The Apocalypse is coming! When the world ends, only the faithful will make it to the new Garden of Eden. All of the Lost Ones are merely fuel for the fire, slaves for the chain, as we strive to bring about the End."
 true_immortal_reform: "§RApostle of the Apocalypse§!"
 true_immortal_reform_desc: "The Apostle cannot be killed, even by the console..."
 haven_of_vengeance_reform: "Haven of Vengeance"
 haven_of_vengeance_reform_desc: "All those who find the End calling their name, all those who get mistreated for for following the deafening dongs of the bell, find their safe haven here. A very devoted and fanatical bunch for making such a pilgrimage, they will take any opportunity to get revenge on their former masters and all heathens with ferocity unmatched, strenghtening our resolve."
