 #Government

 myrmidons_government:0 "Order of the Myrmidons"
 myrmidons_government_desc:0 "The Myrmidons bring the Enlightenment of the Auroral Prince and seek to spread their ideals through the new world. However, their long journey across the Atlantic and the near impossibility of resupply from the CHE for a long time pose severe difficulties."
 mym_autonomy_explanation_tt: "Any provinces outside of our §YAdministrative Capacity§! will have §Rextremely high autonomy§!! Expand the §YAdministrative Capacity§! via the §Gmissions§!."
 myrmidon_exarchate_government: "Myrmidon Exarchate"
 myrmidon_exarchate_government_desc: "An Exarch appointed from among the ranks of the Myrmidon Order presides over a regional council of representatives from various local settlements. This regional council has the latitude to make domestic decisions without consulting the Myrmidon headquarters for every mundane matter."
 myrmidon_exarchate_duchy: "Exarchía"
 myrmidon_exarchate_kingdom: "Megáli Exarchía"
 myrmidon_exarchos: "Exarchos"
 myrmidon_grand_exarchos: "Megalos Exarchos"
 myrmidon_exarchissa: "Exarchissa"
 myrmidon_grand_exarchissa: "Megali Exarchissa"
 mym_exarchates_intolerance_tt: "§ROur Exarchates will be extremely intolerant!§!"
 mym_exarchates_marches_tt: "§GOur Exarchates will gain March bonuses!§!"
 myrmidon_paradise_initiative: "The Paradise Initiative"
 myrmidon_paradise_initiative_desc: "Having been betrayed by the original architects of the plan, it is now up to us to complete Project Paradise. We shall purify the New World and establish the Earthly Paradise!"
 myrmidon_western_protectorate: "The Western Protectorate"
 myrmidon_western_protectorate_desc: "Though the original Project Paradise has been cancelled, this does not mean we have no purpose. The Templarites threaten all of us with their zealotry, and thus our role is to protect the New World from their invasion."
 mym_turtle_ships_gov: "Turtle Ship Doctrine"
 mym_turtle_ships_gov_desc: "Not one life shall be wasted on the sea! Our armored leviathans may not be very fast on the high seas, but they shall truly be unsinkable marvels!"
 
