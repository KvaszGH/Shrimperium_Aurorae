 #Missions
 mym_land_on_big_island_title: "Land on Hispaniola"
 mym_land_on_big_island_desc: "There is a far larger island not too far from where we have landed. It seems promising to settle, and we shall name it Hispaniola, after the last mainland we sighted before the storm took us!"
 mym_finish_hispaniola_title: "Fully Settle Hispaniola"
 mym_finish_hispaniola_desc: "Now that we have fully brought Hispaniola into the embrace of civilization, we can turn our gaze towards Kuba. Our explorers have located a good natural port towards the western end of the isle, quite different from the jungles we originally found in the east. We shall dispatch a force to secure this port, now named Havana after the name of the chieftan of one of the local Taino peoples in the area."
 mym_finish_cuba_title: "Fully Settle Kuba"
 mym_finish_cuba_desc: "Now that we have completed the settlement of Kuba, it is time to turn our gaze towards the mainland. With our new state spanning multiple major islands and our population no longer in danger of extinction, it is time for us to fly on our newfound wings!"
 mym_you_better_have_expansion_ideas_tt: "\n \n §TYou better have§! §YExpansion Ideas§! §Tby this point...§!"
 mym_hispianola_administration_tt: "We will §Gexpand§! our §YAdministrative Capacity§! to include §YHispaniola§!!"
 mym_cuba_administration_tt: "We will §Gexpand§! our §YAdministrative Capacity§! to include §YKuba§!!"
 mym_carribean_administration_tt: "We will §Gexpand§! our §YAdministrative Capacity§! to include the entire §YCarribean§! region!"
 mym_administrate_hispaniola_title: "Administrate Hispaniola"
 mym_administrate_hispaniola_desc: "Now that we have settled Hispaniola, we need to re-establish the trappings of civilization. Bureaucrats and tax-collectors shall be necessary to begin functioning like a proper nation!"
 mym_administrate_cuba_title: "Administrate Kuba"
 mym_administrate_cuba_desc: "We must expand our administration to now also include the other isle, that of Kuba. Coordinating bureaucracy across two different landmasses shall pose new challenges, but we must overcome these if we ever hope to colonize the myriad smaller islands and the mainland."
 mym_administrate_carribean_title: "Island Logistics"
 mym_administrate_carribean_desc: "We have mastered the art of governing over a state consisting of numerous large and small islands. Our chains of logistics effortlessly transition from sea to land, and any would-be invader will find themselves hopelessly confounded by constant harassment from both land and sea."
 mym_land_on_mainland_title: "Mainland Landing"
 mym_land_on_mainland_desc: "The unhospitable lands of the Mainland directly to our south now beckon for us to explore them. Who knows what we may find?"
 mym_explore_colombia_title: "Explore Mainland"
 mym_explore_colombia_desc: "We have explored a significant chunk of the Mainland. Specifically, there are two locations of great strategic interest to us, that we have named Cartagena and Panama. One of these appears to be the most narrow location between two great oceans, while the other will make a great fortification to secure our foothold on the Mainland."
 mym_mainland_foothold_title: "Enlighten the Mainland"
 mym_mainland_foothold_desc: "It is time! Our administration is ready for the task; our people are chomping at the bit to settle the mainland; our explorers have returned with charts of the mainland and two footholds ready! What are we waiting for?"
 mym_cartagena_stronghold_title: "Stronghold at Cartagena"
 mym_cartagena_stronghold_desc: "The stronghold at Cartagena is our greatest asset on the mainland. Serving as both the greatest harbor in the New World and the center of administration from which our mainland Exarchates receive orders and reinforcements, the network of castles and fortified harbors truly is one of the crown jewels of the Myrmidon Order."
 mym_establish_exarchates_title: "Spread the Exarchates"
 mym_establish_exarchates_desc: "Our loyal Exarchates spread the Light of civilization and prepare the ground for our Earthly Paradise. We must lend them all the support they need to flourish!"
 mym_treasure_fleets_title: "Great Treasure Fleets"
 mym_treasure_fleets_desc: "The lands of the Aztecs are flush with gold and silver, and the natives do not even understand the treasure trove they possess! But we know. And we will extract these precious minerals in readiness for trade with the Old World, lest a potential rival siezes the mines for themselves."
 mym_prospect_for_metals_title: "Prospect for Metals"
 mym_prospect_for_metals_desc: "Gold and Silver are not the only valuable metals. Some may argue that they are in fact the least valuable of the mineral bounties of Gaia, as they can ill be used for weapons and tools."
 mym_metals_of_new_world_tt: "All of our §YExarchate§! subjects will gain §G20% Goods Produced§!!"
 mym_enables_panama_tt: "§GEnables§! construction of the §YPanama Canal§!!"
 mym_chokepoint_panama_title: "Chokepoint Panama"
 mym_chokepoint_panama_desc: "Now that we have complete control over the land routes between the northern and southern half of the Mainland, it is time to exert our control over the other ocean as well. During the development of Panama, our Alchemists have drawn up blueprints for a potential massive system of what they call 'locks' to facilitate a canal cutting through the massively uneven territory connecting two oceans of different sea levels."
 mym_the_panama_canal_title: "Monopolize Panama Canal"
 mym_the_panama_canal_desc: "Being able to directly sail between the Atlantic and Pacific Oceans without needing to spend months going around the entire Mainland is an immense advantage.... that we can extend as a privilege to only merchants friendly to us, paying our duties and tolls. Unfriendly merchants will find themselves utterly outcompeted as their goods take months longer to arrive at far higher prices!"
 mym_dawn_of_paradise_title: "§YProject Paradise§!"
 mym_dawn_of_paradise_desc: "Finally, our original mission has been carried out! The New World is safe from all who could potentially threaten our Earthly Paradise, Enlightenment has been spread to the far corners of the Mainland, and the oceans themselves have been joined in our cause."
 golden_age_refresher_tt: "§GReset§! our §YGolden Age§! if we already used it, or §Gextend§! the current §YGolden Age§! by §G50 years§!!"
 mym_no_foreign_colony_tt: "No foreign §YColonial Nation§! must be present in the §YNew World§!! (Australia does not count)"
 mym_no_american_gp_tt: "No other §YGreat Power§! with its capital in the §YNew World§! exists!"
 mym_build_fleet_title: "Prepare Return Expedition"
 mym_build_fleet_desc: "Now that we have found our bearings in this New World, it is time to retrace our steps, with directions and logbooks left us by our ancestors, to find a great ruler known only as the '§JPrince of the Aurora§!'."
 mym_send_expedition_tt: "We will §Ysend an expedition§! to cross the great ocean! (Based on our surviving maps and logbooks, we estimate it will take about 10 years to return.)"
 mym_future_direction_title: "Future Direction"
 mym_future_direction_desc: "The new relevation from the Prince of the Aurora have put our identity into crisis. We must decide on a purpose to rally the people behind!"
 mym_wont_transfer_tt: "This province §Gwill not§! be transferred to our §YExarchates§! automatically!"
 mym_search_for_the_fountain_title: "Fountain of Youth"
 mym_search_for_the_fountain_desc: "Our explorers tell us about rumours of a Fountain of Youth, whose waters can reverse aging and cure any ailment. Our alchemists are already clamouring for an expedition to search for this Fountain, as the waters thereof would be invaluable to their experiments if the rumours prove true."
 mym_control_the_fountain_title: "Control the Fountain"
 mym_control_the_fountain_desc: "Now that we have found the Fountain of Youth, all that's left to be done is to control the Fountain. The Alchemists are already drafting blueprints and gathering equipment for their anticipated laboratories around the Fountain."
 mym_industrialize_the_fountain_title: "Industrialize the Fountain"
 mym_industrialize_the_fountain_desc: "Now that the Alchemists have had their chance to study the Fountain all they like, it is time to put it to greater use in service of the entire [Root.GetName]."
 mym_develop_jamaica_title: "Establishing a City"
 mym_develop_jamaica_desc: "Well, here we are, and here to stay. For whatever reason, this island has a very pleasant clime and the storms that we experienced previously do not even approach. It's time to start establishing farms to feed our people and found a city where we can live!"
 mym_establish_port_au_prince_title: "Establish the Prince's Port"
 mym_establish_port_au_prince_desc: "The natural port of the isle of Hispaniola is an excellent location to establish a new city, from which we will administer to the island. We shall name it in honor of the §JPrince of the Aurora§!, though the new generations no longer even know who He is."
 mym_establish_havana_title: "Fortify Havana"
 mym_establish_havana_desc: "As we settle the isle of Kuba, we need to also establish our administrative centre for the island. The port in the west, Havana, is promising, both for ruling the island and using it as a springboard to enlighten the Mainland."
 mym_all_eligible_trade_centers_tt: "All eligible §Yown§! and §Ysubject§! provinces will gain a §Gpermanent modifier§! granting §Ydevelopment cost§! and §Ytrade power§! bonuses!"
 mym_trade_infrastructure_title: "Establish Trade Cities"
 mym_trade_infrastructure_desc: "Trade is the lifeblood of the economy. We must encourage the settlement of cities in locations strategically suited for trade to stimulate our economy!"
 mym_glassmaking_technique_title: "Secrets of Glassmaking"
 mym_glassmaking_technique_desc: "Glass is such a fragile yet important material. Shipping it across the Atlantic has prohibitively high costs and risks damaging the glass en route; we must develop our own high quality glassmaking in our homelands."
 mym_all_eligible_goods_provinces_tt: "All eligible §Yown§! and §Ysubject§! provinces will gain a §Gpermanent modifier§! granting §Ydevelopment cost§! and §Ygoods produced§! bonuses!"
 mym_coffee_and_tobacco_title: "Coffee and Tobacco"
 mym_coffee_and_tobacco_desc: "The New World is rich in Coffee and a new plant known as Tobacco. Both of these have psychoactive elements which improve focus and prolong wakefulness, though they appear to have some addictive side effects. In any event, our alchemists have started heavily investing in development of these crops."
 mym_stimulants_monopoly_title: "Monopolize Stimulants"
 mym_stimulants_monopoly_desc: "The addictive properties of tobacco and coffee products have proven to be very lucrative; meanwhile, our Alchemists simply can't get enough, claiming it improves their productiveness. We must control the market in these goods!"
 mym_monopoly: "Myrmidon Monopoly on New World Products"
 mym_sugar_and_cocoa_title: "Sugar and Cocoa"
 mym_sugar_and_cocoa_desc: "The New World is rich in Sugar and a new plant known as Cocoa. Both of these are very population ingredients in baking and confectionery arts, and cocoa can be used to create a new sweet known as chocolate."
 mym_sweets_monopoly_title: "Monopolize Sweets"
 mym_sweets_monopoly_desc: "Who doesn't have a sweet tooth? (Actually Alexios doesn't...) The Sweets business is booming, with chocolates becoming prized gifts and hot cocoa being a popular winter drink. We must only ensure the profits belong to us..."
 mym_optics_industry_title: "Optics Industry"
 mym_optics_industry_desc: "As a seafaring nation, it is of critical importance that we be able to spot and shoot any incoming fleet before they can spot us. We must thus invest into the most advanced optics possible, to ensure the accuracy and range of our cannonfire."
 mym_textiles_industry_title: "Textiles Industry"
 mym_textiles_industry_desc: "As we grow into a great empire, we must invest into our textiles industry. Advanced textiles have both critical military applications, such as uniforms and better sails that the Europeans have begun to use, as well as civilian, improving the standard of living of our people."
 mym_munitions_industry_title: "Elite Marine Armaments"
 mym_munitions_industry_desc: "Marines are very versatile soldiers. They can launch amphibious invasions, board enemy ships, or even just serve as elite regiments in normal land combat. We must ensure that they have the best munitions money and alchemy can produce!"
 mym_turtle_ship_title: "Turtle Ship Doctrine"
 mym_turtle_ship_desc: "Protecting the lives of our soldiers and sailors comes above everything! With our small numbers, we cannot afford any losses, and our naval doctrine must reflect this. Our ships must be armored leviathans, capable of shrugging off cannonballs and keeping all aboard safe, even if means sacrificing some ocean-faring capability!"
 mym_thalassocracy_title: "Proclaim Thalassocracy"
 mym_thalassocracy_desc: "With an iron grip on New World trade goods and the naval prowess to protect it, we can truly proclaim ourselves not merely a regional thalassocracy, but the Global Thalassocracy in both East and West!"
 
 #Events
 ia_flavor_mym.2.t: "Stranded!"
 ia_flavor_mym.2.d: "Originally sent to scout ahead in advance of the Xizho migration to their destined Paradise of the Earthly Realm, the Myrmidon Expedition departed from Antioch with great fanfare only to run into unceasing obstacles. From Venetian and Berber raids, to harassment by Christian Knightly Orders around Gibraltar, to violent storms that blew the fleet off course, less than a tenth of the original armada has survived the journey to the west. Finally, the remainder of the fleet has found a sufficiently sizable island with enough resources to avoid starvation and possibly repair some of the ships. \n \n Xu Fu, the nominal leader of the Myrmidon Expedition, who supposedly agreed to temporarily leave the Immortal Realms to help navigate as a personal favour for the Prince of the Aurora, is already busy taking a nap on a hammock set up between two trees near the beach. Though his skills in navigation were indeed impressive, he has otherwise proven to be exceedingly useless and refuses to put any of his Transcendent abilities to good use..."
 ia_flavor_mym.2.a: "Everything is fine. Surely."
 ia_flavor_mym.3.t: "Settling in Hispaniola"
 ia_flavor_mym.3.d: "Our preliminary scouting expeditions had revealed that there were two major islands near our landing place. The one to the north, which we named Kuba after what some of the native people there called it (we are still trying to decipher their language), is densely forested by unpleasant jungle. The one to the east, however, has hills and plains reminiscent of Hispania, and we have named it Hispaniola. Here, some of our intrepid survivors will attempt to set up our first colony and bring the light of civilization to these lands. \n Xu Fu, on his part, went with the settlers to Hispaniola and promptly disappeared. Though we will keep watch in case he mysteriously re-appears again, we suspect he has returned to the immortal realm somehow, to nobody's great loss. Perhaps he sensed that he was beginning to overstay his welcome."
 ia_flavor_mym.3.a: "Proceed with settling Hispaniola!"
 ia_flavor_mym.4.t: "The Expedition Returns!"
 ia_flavor_mym.4.d: "Peng Guanting, leader of the expedition we dispatched a few years ago, has arrived back at Jamaica far ahead of schedule! It would appear that we had overestimated how long the journey would take. While her fleet has been somewhat diminished, she brought welcome news: the expedition had been a resounding success, and she had in fact obtained an audience with the §JPrince of the Aurora§!, Chen Yangshing. As such, she had also brought with her an emissary from the §JPrince of the Aurora§!, with a message for our Grandmaster. \n\nThe emissary has, indeed, a lot to say. About the events that have unfolded since we were lost at sea, the establishment of the Celestial Hellenic Empire, and the conflicts with the Christians. He tells us that when we never sent word back for decades, the Myrmidon Expedition was considered lost at sea, and the Paradise Project was put on rather permanent hold. Instead, the Xizho have decided to carve out a new homeland in the Middle East, and have been fairly successful in doing so.\n\nThe implications of this are incredible. Our entire founding legend, our mission, our holy task, the very drive that kept us going for these many decades in this desolate New World has just become obsolete. We are no longer needed. While the emissary has assured us that any of us who wish to return to the CHE would be warmly welcomed, almost all of us now were born here in the New World and have no connection to the CHE. What, indeed, shall be our purpose now?"
 ia_flavor_mym.4.a: "We have much to think about..."
 mym_cultural_change_tt: "\n\n§YOur culture has shifted...§!"
 ia_flavor_mym.5.t: "Our New Purpose"
 ia_flavor_mym.5.d: "The Exarchs and advisors at the court have divided into roughly two camps regarding our new purpose. One faction argues that though the goal is no longer to move the entire Xizho people to the New World, they are still our kin, and we should cooperate more closely with them to fight the Crusaders together and protect the New World from the barbarian invaders. The other faction claims that the Xizho have betrayed us and written us off, and now seek only to continue manipulating us to their advantage. They would have us cut all ties with the Celestial Hellenic Empire and the Prince of the Aurora, and continue focusing on our true purpose: the creation of the Earthly Paradise, a pure land reserved exclusively for the Chosen of the Xienjing, cleansed of all barbarians native or otherwise."
 ia_flavor_mym.5.a: "We shall protect the New World!"
 ia_flavor_mym.5.b: "We owe nothing to the Auroral Prince!"
 ia_flavor_mym.6.t: "The Fountain's Bounty"
 ia_flavor_mym.6.d: "The research of the Alchemists has revealed that though the Fountain of Youth does not truly reverse aging, its waters do indeed prove remarkably potent in wound recovery and disease treatment. In the proper formulas, the waters can be synthesized into rapid wound-closure ointments or pills that cure many of the known diseases. The only issue is that despite their best efforts, the Alchemists have not been able to coax the Fountain into increasing its flow of miracle water, which means we are ultimately limited in how quickly we can produce Fountain-derived medicines. How shall we best use our limited supply?"
 ia_flavor_mym.6.a: "The betterment of the people!"
 ia_flavor_mym.6.b: "The military must be prioritized."
 theocracy.1.ia1: "A Veteran Knight"
 theocracy.1.ia2: "A Talented Alchemist"