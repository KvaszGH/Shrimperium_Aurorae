 #Events
 ia_hesse.1.title: "Letter from a Brother"
 ia_hesse.2.title: "Frankfurt Accepts!"
 ia_hesse.3.title: "Frankfurt Declines"
 ia_hesse.4.title: "Our Old Allies of Meissen"
 ia_hesse.5.title: "A Clear Sky above Hesse"
 ia_hesse.5.desc: "The Moon shined bright upon the land, as [Root.Monarch.GetName] let his mind wander over the future of the duchy. Staring off into the distance, he envisioned a future, a future where [HES.GetName] stretches across the Rhine river, with unparalleled prestige on the world stage. Two distinct ideas flashed into his mind, both of which had an equal opportunity to become the new direction of [HES.GetName] and how it behaves in the future. How shall we proceed into our new future?\n\n(§RWARNING: Your choice in this event may change the rewards of further missions!§!)"
 ia_hesse.5.a: "Through Roses and Thrones"
 ia_hesse.5.b: "Throught Steel and Bones"
 ia_hesse.6.title: "The New Martial Wing"
 ia_hesse.6.a: "Get to Work!"
 ia_hesse.7.title: "Good Soldiers read Books"
 ia_hesse.7.desc: "A soldier who disregards reading and education is, at best, cannon fodder and at worst, a fool. Eductation within the army is not only expected, but mandatory for rising amongst our ranks, for a commander who cannot read is useless. We designated a school and university in Marburg for this purpose, and while it has been relatively small in scope compared to other major learning institutions, that's beginning to change as the Duchy of [HES.GetName] establishes itself within Germany, leading to demand for good quality education and young talent coming from all over Germany and even beyond!"
 ia_hesse.7.a: "Fascinating! Can they lead an army yet?"
 ia_hesse.8.title: "Finances of the German Crown Cut"
 ia_hesse.8.desc: "Due to recent political developments, the German Crown has cut it's funding of the Martial Wing of the Marburg University, and after recent talks, it seems unlikely that they will ever fund it again."
 ia_hesse.8.a: "Hesse will have to fund the wing by itself now."
 ia_hesse.9.title: "Expansion of the Martial Wing Finished!"
 ia_hesse.10.title: "The first Saxon Regimental Town"
 ia_hesse.11.title: "Interconnection of our Capitals"
 ia_hesse_desc_11.1: "As more resources are being directed into [Root.Overlord.Capital.GetName], the diplomats of [Root.Overlord.Monarch.GetTitle] [Root.Overlord.Monarch.GetName] have approached us with a demand from the [Root.Overlord.Monarch.GetTitle] himself: Expand the works significantly, expand the scope of the works to be as far reaching as [Root.Overlord.Capital.GetName] deserves to be, and both capitals shall prosper from shared cooperation."
 ia_hesse_desc_11.2: "[Root.Monarch.GetTitle] [Root.Monarch.GetName] walks among the soldiers of the newly expanding Regimental Town, as proposed and planned by the Duchy of [HES.GetName]. What he sees is impressive, but the nagging feeling of it not being enough to impress the world doesn't leave. Later that day, he sends out diplomats to [HES.GetName] with one express purpose: Demand a much greater expansion of the works than first proposed, in exchange for cooperation between the nations capitals."
 ia_hesse.11.a: "Onwards!"
 ia_hesse.11.b: "Let's hope they accept."
 ia_hesse.12.title: "The Works are Finished!"

