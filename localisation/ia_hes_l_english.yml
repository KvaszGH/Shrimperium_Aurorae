 #Government Reforms
 mechanic_rhenish_bureaucratic_apparatus_province_mods_yes:9 "Unlocks the §YRhenish Bureaucratic Apparatus§! Mechanic which has the following effects:\nRhenish culture provinces gain:\n   §G-20%§! Province Governing Cost\n   §G-20§! Local Governing Cost Increase \n\nProvinces not of Rhenish culture gain:\n   §R+20%§! Province Governing Cost\n   §R+20§! Local Governing Cost Increase"
 rhenish_bureaucratic_apparatus: "Rhenish Bureaucratic Apparatus"
 rhenish_bureaucratic_apparatus_desc: "Governance focused on the long term growth and prosperity of the Rhenish populace. Every city and town is carefully monitored through an extensive governing body. The result is a much greater integration between the Rhenish peoples and our state, but every other culture unfamiliar of the cooperation required to run our apparatus is notably more difficult to govern."
 rhenish_bureaucractic_apparatus_positive_modifier: "Rhenish Governance"
 rhenish_bureaucractic_apparatus_negative_modifier: "Rhenish Governance"
 #Privileges
 estate_nobles_hes_integration_of_houses: "Integration of Houses"
 estate_nobles_hes_integration_of_houses_desc: "Our direction is not to subjugate foreigners under an iron fist, but to unite the infighting nobles under one banner, our banner, through marriages, alliances and backdoor deals."
 estate_nobles_hes_justification_through_power: "Justification of Power"
 estate_nobles_hes_justification_through_power_desc: "We are the strongest, the proudest, the best equipped and the most trusted by the German Crown. Nothing will escape our grasp in a ruthless pursuit of putting down any Nobles who might dare to rise up against the German Crown."
