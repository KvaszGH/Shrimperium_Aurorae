 ia_saxon_crown.2.t: "Sanctions from the Germanic Crown"
 ia_saxon_crown.2.d: "Our lack of any acts of contrition or signs of ceasing our aggressive behavior has raised the ire of the Royal Court. With our rivals whispering poison in their ear, the König has declared us to be a threat to the Realm and thus under Royal Ban until we reform our ways!"
 ia_saxon_crown.2.a: "Alarming..."
 ia_saxon_crown.3.t: "Punishment from the Germanic Crown"
 ia_saxon_crown.3.d: "Sick and tired of us upsetting the balance of power in Germany, the Royal Court and all fellow vassals afraid of our might have united to declare a Dismantlement War against us!"
 ia_saxon_crown.3.a: "This is a disaster!"
 ia_saxon_crown.1.t: "Strongly Worded Letter from the Germanic Crown"
 ia_saxon_crown.1.d: "It would appear that our rapid expansion has drawn the attention of the Royal Court! Spurred upon by our jealous rivals, the König has issued us a warning to cease our so-called aggressive actions, lest the Royal Court be forced to take further action."
 ia_saxon_crown.1.a: "Pah, all talk and no action!"

