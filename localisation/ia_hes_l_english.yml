 #Missions
 ia_hesse_shattered_succession_title: "A Shattered Succession"
 ia_hesse_shattered_succession_desc: "The sudden death of Konrad the third during the war of the northern coalition aimed to curb the rising saxon power left the duchy of Thuringia divided between his descendants. On the 27th of september of 1443, the oldest son, Albereich the First, trained general alongside the Royal army of Thuringia, now stationed in the Niederhessen quarters, took the leadership of his former companions and established the duchy of hesse. Now his sight rests on the former borders of his dead father legacy. Now it's his duty to honor the king of Thuringia and restore what was once a proud duchy, standing tall among their german rivals. The time has come to reach out once more to the duque of Nassau, brother of Konrad and faithful loyalist to the crown."
 ia_hesse_muster_the_army_title: "Muster the Army"
 ia_hesse_muster_the_army_desc: "With the regained support from the troops of Nassau, the pockets of the landsknechts filled and our soldiers drilled and thirsty for glory, it is time to pick up the pieces and put them back in their rightful place: under our iron hand and a firm leadership."
 ia_hesse_depose_noble_regency_title: "Depose the Nobles Regency"
 ia_hesse_depose_noble_regency_desc: "After the death of Konrad, the royal palace got stormed by all the noble families of Thuringia claiming that each of them were the most capable to occupy the now empty throne, resulting in an unending conflict between nobles with a complete disregard for the people they should be caring for and protecting. This situation shall be put to an end. No nobleman with a desire of power should ever attempt to occupy the throne of our king and we must make an example of it for all to be seen. All the members of noble houses responsible of this willing desecration of the name and throne of Konrad will be tried by martial court and sentenced to death by hanging."
 ia_hesse_mend_succession_title: "Mend the Succession"
 ia_hesse_mend_succession_desc: "The pre-collapse borders of Thuringia have finally been restored. Now, under the firm rulership of Hesse, new horizons have opened up and new opportunities have appeared in front of us and our situation under saxon influence takes a new turn. We are no longer the remnants of a defeated country and our soldiers have made proof of their superior quality on the borders of Saxony. It is time that the saxon king recognises our prowess and starts to see us not only as a means to an end but as a powerful ally that should not be disregarded."
 ia_hesse_once_a_tower_title: "Once upon a Tower"
 ia_hesse_once_a_tower_desc: "It is known that from the terraces and balconies of Schloss Berlepsch one can admire the beauty of the Hessian lands and those that lay further from it's borders; the dark green and lush forests that cover the lands of the north, ranging from the bustling cities of the rhine that shyly peak out through the treetops, to the far east coastlines of Pommern where it is said that graze the biggest reindeers that are to be seen in all of Germany.\n\nFrom atop the keep of the castle one can not distinguish where the borders of Hesse are set, making it easier to getting lost in thought and wonder if it is possible that one day, maybe on this life or the next one, all this beautiful lands could get rid of those petty claims that noble families stake here and there and instead be unified under a single state, without any more unnecessary disputes about manmade fictional lines that separate it's inhabitants under different rules."
 ia_hesse_follow_the_rhine_title: "Follow the Rhine"
 ia_hesse_follow_the_rhine_desc: "WIP"
 ia_hesse_formalise_the_union_title: "Formalise the Union"
 ia_hesse_formalise_the_union_desc: "WIP"
 ia_hesse_frankfurt_question_title: "The Question of Frankfurt"
 ia_hesse_frankfurt_question_desc: "Theodelinda, second child and the only daughter, has always been charming and eloquent, often accompanying Konrad during his meetings with other duques or even travelling to foreign lands as the representative of Thuringia speaking in name of our king. After the coalition war she seeked refuge in the hometown of her mother. Within the following weeks after the death of Konrad and the turmoil caused by the nobility in Erfurt, the city of Frankfurt cut off relations with the capital and proclaimed the first republic of the rhine, electing the doughter of Konrad as its first leader. Her loyalty to her father was never doubted and neither were her duties to the crown. We shall seek to reunite the brothers and join our efforts in restoring the duchy."
 ia_hesse_meissen_occupation_title: "Resolve the Occupation"
 ia_hesse_meissen_occupation_desc: "The people of Meissen have always been fierce warriors and loyal friends of Thuringia but after our defeat in the coalition war, the saxon king decided to make an exemplary punishment to those who rose against him and took direct control of most of the countryside of Meissen, leaving its capital deprived of a source of food and surrounded by its men, slowly starving the city since the now occupied fields and peasants have to provide their produce to the saxon armies instead. However, the rule over those new fields has been proven challenging and resource intensive. The local partisans have been assaulting over and over the stationed troops of Saxony and even though the war has long ended, the conflict over the region has not. We could reach out to our saxon King and propose him a new deal: they cede back the lands to the Meissen duchy under our direction and in exchange we subsidize their much needed grain taxes thus ending the conflict and allowing the withdrawal of permanently stationed saxon troops. It may not be the best deal for us but we can at least honour our old alliance with our friends in need."
 ia_hesse_lands_inbetween_title: "The Lands Inbetween"
 ia_hesse_lands_inbetween_desc: "WIP"
 ia_hesse_treason_of_youngest_title: "Treason of the Youngest"
 ia_hesse_treason_of_youngest_desc: "The honor of a soldier is his life, his duty is his fate and his only fear shall be to fail what he pledged to protect, and Magneric failed to uphold any of these principles. A desertor from within our armies during the battle of Leipzig. Not only did he fail as a commander, never leading his troops into battle, but he also lead his men into a massacre due to disobeying instructions from other army commanders and fleeing the battlefield when the situation got dire. Now with the border cities of southern Mainz reclaimed and his personal guard defeated, his fate resides in our hands. A traitor to the crown can only be tried by martial court and his punishment is none but death, even for a Ludowinger."
