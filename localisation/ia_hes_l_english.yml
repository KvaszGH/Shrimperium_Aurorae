 #Events, modifiers and decisions related to regimental mechanic
 ia_hesse.105.title: "Explanation of the Hessian Regimental System"
 ia_hesse.105.desc: "You are playing a german culture country and the first regimental town, city or capital has been built. You can use them, so they do concern you. Their mechanics are:\n\n- These regimental towns, cities and capitals can be conquered and used by §RANY§! german culture country\n\n- Each regimental capital, city or town will apply statewide provincial bonuses to german culture provinces for the owner. If you don't own the town, city or capital province itself, your provinces within the state will be excluded\n\n- If any non-german country ever acquires a province with the town, city or capital modifier, it will be §Rdestroyed§!!\n\n- If any german country re-acquires a province where the town, city or capital once stood and the province culture is still germanic, they will get an option to rebuild it, for a price of course."
 hes_regiment_explanation_event_tt: "Got it."
 ia_hesse.105.a: "Got it?"
 hes_regimental_system_tutorial_decision_title: "Hessian Regimental System Tutorial"
 hes_regimental_system_tutorial_decision_desc: "Quick one-time event explaining everything regarding the Hessian Regimental System. You are playing a german country, so it does concern you, and it's recommended you click this if you don't know what's it about."
 hes_regimental_system_rebuild_wiped_out_regimental_everything_tt: "Owns a province which once hosted a Regimental town, city or capital!"
 hes_regimental_system_rebuild_wiped_out_regimental_everything_title: "Rebuild a Regimental town / city / capital"
 hes_regimental_system_rebuild_wiped_out_regimental_everything_desc: "As we own one of the provinces which were once part of the Hessian Regimental System, unjustifiably destroyed by an outside power, we could rebuild it and potentially use it for ourselves."
 ia_hesse.102.title: "The Price of War"
 ia_hesse.102.desc: "War channels many feelings within men, many of which include resentment and anger towards the enemy. But what our soldiers saw when they entered the now deserted part of the Regimental System made them drop any feelings apart from pity. The conditions have reached a low we haven't quite seen before, with sanitary standards being beyond neglected, tents torn up, buildings burned in a hasty retreat. Whatever remained of it was unusable and described as 'beyond saving' by our troops, who don't ever want to step in there again."
 ia_hesse.102.a: "Who knows what other horrific experiments are happening in Germany?"
 hes_regimental_system_conquered_by_outsider_tt: "We must dismantle this hellhole!"
 ia_hesse.104.title: "Shift away from German doctrine"
 ia_hesse.104.desc: "As we abandon everything that once made our state german, the other thing that must go is the Regimental System. Such a barbaric display of packing together humans as if they were salami, the utter carelessness, and with no greater cause to support such, is what germans do."
 ia_hesse.104.a: "We must move on."
 ia_hesse.106.title: "Rebuilding Parts of the Regimental System"
 ia_hesse.106.desc: "My $MONARCHTITLE$, we finished combing through records of the Regimental System, and we are eligable to rebuild some parts of it within our lands. It will take years of concentrated effort, but we can revive these marks of German military pride."
 ia_hesse.106.a: "The Regimental Capital of [reg_capital_for_rebuilding.GetName] once stood as a jewel inside [reg_capital_for_rebuilding.GetAreaName]."
 ia_hesse.106.b: "[reg_city_for_rebuilding.GetName], The Regimental City."
 ia_hesse.106.c: "[reg_town_for_rebuilding.GetAreaName] once held a Regimental town in [reg_town_for_rebuilding.GetName]."
 ia_hesse.106.d: "Rebuilding them is too costly as of now."
 ia_hesse.107.title: "A Military District has been Rebuilt!"
 ia_hesse_107.1: "After extensive resource diversion, the Regimental Capital of [Root.GetName] has been reconstructed, once again standing as a beacon of German military might and putting even the Roman camps of old to shame."
 ia_hesse_107.2: "Many turbulent years have passed, and through the effort, the Regimental City of [Root.GetName] has been meticulously reconstructed, once again ready to house, train and produce endless soldiers for our cause."
 ia_hesse_107.3: "The Regimental System must be reconstructed to its full glory, and allow it to grow out further. With the reconstruction of [Root.GetName], we get one step closer to that goal."
 ia_hesse.107.a: "We are the giants our enemies must fear!"
 ia_hesse.107.b: "We stand on the shoulders of giants!"
 ia_hesse.107.c: "Never to be conquered again!"
