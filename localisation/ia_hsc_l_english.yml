 bri_menowar_mod: "Great Men'o'war"
 ia_colonial_rush: "Colonial Rush"
 ia_around_the_cape: "Round the Cape"
 last_king_in_residence: "§JLast King's Court§!"
 last_king_in_residence_desc: "The Last King holds his court of trees and shadows in this province, protecting his corner of untouched wilderness from the world outside."
 crossroads_gift_of_power: "A Dark Gift: Dominance"
 crossroads_gift_of_charisma: "A Dark Gift: Charisma"
 crossroads_gift_of_vengeance: "A Dark Gift: Vengeance"
 crossroads_price_cooldown: "Crossroads Cooldown"
 crossroads_tasteless_province_mod: "Tasteless"
 crossroads_lack_of_taste: "Lack of Taste"
 crossroads_lack_of_taste_desc: "Our people have lost their sense of taste. The simple pleasures of consuming food and drink being denied, they find it hard to be motivated to do anything at all."
 crossroads_essence_of_passion: "Lack of Passion"
 crossroads_essence_of_passion_desc: "Our people have lost the essence of passion. Survival is a rote task, what do we live for?"
 crossroads_dreams_and_madness: "Dreams and Madness"
 crossroads_dreams_and_madness_desc: "Our people have lost their grasp of reality. What is a dream? What is real?"
 crossroads_warping_time: "Warping Time"
 crossroads_warping_time_desc: "Our people have lost touch with the passage of time. Is it today? Is it yesterday? Is it perhaps next year?"
 
 #Missions
 hsc_gold_mining_title: "Establish a Mint"
 hsc_gold_mining_desc: "Though our people may seek harmony with nature, a modern economy requires currency to function. Thus, we should establish regulations over gold mining and coin minting."
 wof_ven_challenge_antiochene_supremacy_title: "Challenge Antiochene Supremacy"
 wof_ven_challenge_antiochene_supremacy_desc: "The Xizho fancy themselves supreme rulers and have staked their claim on the environs of Rome, former seat of Christendom. We shall show them that their pretensions are merely that, by taking Rome for ourselves!"
 hsc_prosperous_highlands_title: "Invest in the Ancient Groves"
 hsc_prosperous_highlands_desc: "We should begin to secure our economic prosperity starting from those groves that have kept us safe for so long."
 hsc_agricultural_investments_title: "Agricultural Investments"
 hsc_agricultural_investments_desc: "Feeding our people is critical."
 hsc_regulate_wool_grazing_title: "Regulate Sheep Grazing"
 hsc_regulate_wool_grazing_desc: "To preserve the balance of nature and protect our wool industry in the long-term, we should codify clear instructions on how, where, and when sheep should graze."
 hsc_answer_the_growing_needs_title: "Develop the Highlands"
 hsc_answer_the_growing_needs_desc: "We have lived for a long time amongst the highlands of the north. This experience shall prove invaluable in better understanding how to develop these lands for the future."
 hsc_unlock_highlands_privilege_tt: "We will §Gunlock an estate privilege§! for the §YMerchants§! which grants bonuses in §YHighlands, Hills, and Mountains§! terrain."
 hsc_tools_industry_title: "The Tools Industry"
 hsc_tools_industry_desc: "More and better agricultural tools will help maximize the efficiency at which we can produce cloth and food."
 hsc_welsh_iron_title: "Welsh Iron"
 hsc_welsh_iron_desc: "Our new toolmaking industry requires a good source of iron and steel. And so does our army..."
 hsc_beer_title: "Beer!"
 hsc_beer_desc: "Alcohol has been a staple of peoples everywhere for as long as anyone can remember. But we have the best beer, distilled only from the happiest grain!"
 hsc_aberdeen_seafood_title: "Seafood in Aberdeen"
 hsc_aberdeen_seafood_desc: "A bounty of food can be found in the North Sea. Let us invest into the proper infrastructure to harvest this food."
 hsc_scottish_clothing_title: "Scottish Cloth"
 hsc_scottish_clothing_desc: "Our cousins the Scots have figured out to make fine cloth from wool. We should nurture this ability."
 hsc_export_cloth_title: "Export Scottish Cloth"
 hsc_export_cloth_desc: "Now supplied with the finest of wool from happy sheep, the Scottish cloth industry produces some of the finest cloth in the world, second only to Auroral Silk. We should invest in export infrastructure to reap the profits from those hesistant to trade with the Dao-Hellenes."
 hsc_protect_cloth_title: "Protect the Cloth Industry"
 hsc_protect_cloth_desc: "The success of our cloth has drawn envious eyes from other nations and a greedy gaze from pirates. We should ensure the construction of a great citadel to protect our industry."
 hsc_expand_cloth_title: "Expand the Cloth Industry"
 hsc_expand_cloth_desc: "Merely one city is not enough! We need more production of cloth, both for ourselves and for export. May all around the Atlantic buy Gaelic cloth!"
 hsc_irish_industry_title: "Éirish Industrial Revolution"
 hsc_irish_industry_desc: "Let us spur on an Industrial Revolution in Éirann, the better to compare with our own flourishing."
 hsc_free_our_brothers_title: "Free Our Brethren"
 hsc_free_our_brothers_desc: "The peoples of the Emerald Isle were the most recent to be forced into worship of the dead crucified god. Many secret brothers and sisters of nature still exist there. We must liberate them from their oppressors wielding the vile Cross!"
 hsc_face_the_cumans_title: "Face the Cumans"
 hsc_face_the_cumans_desc: "The Cumans are the most recent of foreign oppressors on these fair shores. We shall drive them back into the ocean!"
 hsc_expel_cumans_title: "Expel the Cumans"
 hsc_expel_cumans_desc: "Vile Cumans, who pillage and burn, who cut down the verdant groves! There shall never be a home for you here!"
 hsc_common_works_title: "Shared Dreams"
 hsc_common_works_desc: "The Dream of Unity should be shared with all our brethren."
 hsc_restoring_the_preserves_title: "Restore the Emerald Groves"
 hsc_restoring_the_preserves_desc: "The foreign barbarians and followers of the vile torture device have despoiled the Sacred Groves of the Emerald Isle. It falls upon us to restore them to their full splendor."
 hsc_kickstart_naval_industry_title: "Kickstart the Naval Industry"
 hsc_kickstart_naval_industry_desc: "Our druids will sing the mightiest of volunteered wood out of the Great Trees that we may begin the construction of the mightiest navy in the world."
 hsc_prepare_the_army_title: "Rally the Sworn Brothers"
 hsc_prepare_the_army_desc: "The followers of the dead crucified imposter close in upon us from all sides. We must rally the clans to make one last stand -- To drive back the despoilers of nature once and for all, or die in defence of the last Great Trees."
 hsc_push_into_lowlands_title: "Take the Lowlands"
 hsc_push_into_lowlands_desc: "The first step to restoring the dominion of nature must be to retake the lowlands around our Highlands."
 hsc_liberate_the_isles_title: "Liberate the Isles"
 hsc_liberate_the_isles_desc: "The Isles are our kin, and the Norwegians aim to exterminate them. This shall not come to pass!"
 hsc_unite_shattered_lands_title: "United the Shattered Lands"
 hsc_unite_shattered_lands_desc: "Petty lords, invaders or otherwise, all followers of the dead crucified imposter, have divided the land in endless, bloody squabble. This ends now."
 hsc_saxons_no_more_title: "Saxons No More?"
 hsc_saxons_no_more_desc: "The Saxons came to these shores as invaders, but now we have reconquered their former conquests."
 hsc_dream_of_unity_title: "§JThe Dream of Unity§!"
 hsc_dream_of_unity_desc: "§JA Beautiful Dream§!"
 hsc_approach_the_cats_title: "Approach the Cat-Sìth"
 hsc_approach_the_cats_desc: "Off our shores there is a shrouded island, ruled entirely by the Cat-sìth! As guardians of the Otherworld, these Fae Felines guide souls to the afterlife and possess supernatural wisdom and knowledge. Cooperation with them might be difficult, but yields great benefits."
 hsc_brothers_of_a_different_species_title: "Brothers of the Fae"
 hsc_brothers_of_a_different_species_desc: "Though the Fae may be tricksters and incredibly secretive, the Cat-Sìth have long lived alongside the Gaels, and generally been more helpful than harmful. We should form a closer bond to minimize the harm and maximize the help."
 hsc_closing_ties_title: "Ever Closer Ties"
 hsc_closing_ties_desc: "The Cat-Sìth have grown intertwined in our society, and numerous of our Archdruids have adopted feline familiars on the basis of an equal partnership. It is hard to even tell anymore who is guiding who."
 hsc_a_new_empire_title: "§JA New Empire§!"
 hsc_a_new_empire_desc: "It is a great day for Nature! Finally, we have proven that an empire can stand on the basis of harmonious coexistence with nature rather than its rapacious exploitation. May our example inspire all friends of the wild and strike fear into the hearts of all who would exploit nature!"
 hsc_take_northumbyre_title: "Subjugate Northumbyre"
 hsc_take_northumbyre_desc: "Taking the lands of Northumbyre will gain us access to the wealthy southerlands of Brythonia."
 hsc_take_wales_title: "Defeat Gwynedd"
 hsc_take_wales_desc: "Gwynedd siezed the High Kingship centuries back. Their lands are rich with minerals that will be invaluable for our industry."
 hsc_end_cornish_piracy_title: "End Cornish Piracy"
 hsc_end_cornish_piracy_desc: "As annoying a thorn as the Cornish are in our side, think of how useful they could be turned to our cause..."
 hsc_expand_sacred_groves_title: "Restore the Sacred Groves"
 hsc_expand_sacred_groves_desc: "We must restore the Sacred Groves to those lands long lanquishing under the abuse of the vile Crucific worshippers."
 hsc_new_capital_title: "A New Capital"
 hsc_new_capital_desc: "As our realm expands, we should look to establish a new seat of governance within our new domains."
 hsc_grand_archives_title: "The Grand Archives"
 hsc_grand_archives_desc: "We need to establish new systems of records keeping for our burgeoning state."
 hsc_wool_provinces_tt: "All of our currently owned provinces producing §YWool§! meeting the mission requirements will §Ggain 2 Base Production§!. Additionally, aforementioned provinces will have their §Gproduction building upgraded§!."
 
 # events
 gaeldom.1.t: "Expulsion of the Cumans"
 gaeldom.1.d: "The invaders to this beautiful Emerald Isle, those who would disrupt the harmony of nature and bring their raiding and pillaging ways to despoil the sanctity of life -- THERE IS NO PLACE FOR THEM HERE. Let us send them back from whence they came so many years ago."
 gaeldom.1.a: "Good Riddance!"
 gaeldom.2.t: "The Fate of the Anglo-Saxons"
 gaeldom.2.d: "From almost since the fall of Roman Brittanica, the Angles and the Saxons have fought a war against the Brythonic peoples over control of the Southerlands. Now we have put an end to this ancient conflict and can choose how we wish to resolve this conflict for good."
 gaeldom.2.a: "The Brythons and the Angle-Saxons must live in peace under our rule!"
 gaeldom.2.b: "The Brythonics are kin -- the Saxons are not. We will let the Welsh do as they will to the Saxons..."
 gaeldom.3.t: "A New Era Dawns"
 gaeldom.3.d: "Long have the Brittanic Isles been disunited and despoiled by foreign invaders. Long have the followers of the dead crucified god violated our holy groves and sacred pools. Long has nature been disregarded. But all of that changes in this new era: the Era of Nature!"
 gaeldom.3.a: "For a safe and secure society!"
 gaeldom.4.t: "Great Looms of Lothian"
 gaeldom.4.d: "With the looms of Lothian under our control, we have managed to combine the Scottish art of weaving together with our druidic arts to produce better wool. Our new brand of cloth will truly upend the market!"
 gaeldom.4.a: "Great News!"
 gaeldom.5.t: "War Druid Recruited"
 gaeldom.5.d: "War Druids use the power of the winds and the earth to guide and protect their soldiers."
 gaeldom.5.a: "Excellent."
 ia_flavor_sax.25.t: "Conversion demand from Antioch"
 ia_flavor_sax.25.d: "After our recent alliance with Antioch, the Prince of the Aurora has send a curious demand to us for the continuation of the alliance. It requires us to convert to the Dao-Hellenic Faith in order to join the Path of Enlightenment. How shall we respond?"
 ia_flavor_sax.25.a: "We shall convert!"
 ia_flavor_sax.25.b: "Never!"
 gaeldom.6.t: "Fall of the Cuman Irish Kingdom"
 gaeldom.6.d: "Ever since the legendary Cuman adventurer Yurukhan of Azov hired a band of plucky Gothic pirates from Theodoro and invaded Ireland with his sworn banners, the Kingdom of Ireland has been ruled by his descendants. Today however, the Cumans have been driven from the Emerald Isle once again and been forced back to Azov. While the Azovian dynasty of Ireland clings to the royal title, in truth they have no more influence in the de jure Kingdom."
 gaeldom.6.a: "A disaster!"
 gaeldom.7.t: "The Last King"
 gaeldom.7.d: "The hollow of the old Oak where the starlight never falls\n Lives a King without a Kingdom, behind moss covered walls\n Golden hair turns silver white\n Eyes like winters first frost\n He counts the years and falling leaves for all he has lost\n The last king wears a crown of bone\n Sits upon a throne of stone\n All his people gone away like morning mist at break of day\n The forest keeps his secrets well, stories that he will never tell.\n \n I heard him singing in the night, an old song sad and low\n  About a time when Magic lived a thousand years ago\n He speaks to shadows on the wall, they answer back in kind\n The only court he holds these days exists within his mind.\n \n The last king wears a crown of bone, sits upon a throne of stone\n  All his people gone away, like morning mist at break of day\n The forest keeps his secrets well, stories that he will never tell. \n \n Some say he is waiting for the dawn, when elves will walk again\n Some say he is just a madman lost, who's forgotten how to mend\n  But I have seen the light behind his eyes when autumn winds blow cold\n  There is magic there that wont give up\n A fire burning old\n The last king wears a crown of bone, sits upon a throne of stone\n All his people gone away like morning mist at break of day, but the forest keeps him company and that's enough."
 gaeldom.7.a: "The Last King shall have his Court"
 gaeldom.7.b: "Bah, sounds like a random madman"
 gaeldom.8.t: "A Ghost in the Books"
 gaeldom.8.d: "A group of prominent scholars from the University of Oxford have come with what they claim to be an intriguing discovery.\n 'My [Root.Monarch.GetTitle], odd historical texts not previously recorded as having existed in our University's archives have recently been discovered randomly by students. A commonality of these texts is that they seem to paint a picture of a mysterious figure behind many of the legendary events in our history, and further that there appears to be some sort of riddle hidden among the books regarding this figure's identiy. If we could just have some funding to investigate this more fully...'"
 gaeldom.8.a: "Granted!"
 gaeldom.8.b: "We have no money for wild goose chases!"
 gaeldom.9.t: "The First Riddle"
 gaeldom.9.d: "The research team has deciphered the following riddle decribing the identity of the mysterious figure:\n Feather, scale, hair and skin\n Far away, deep within.\n River's source and lordly end\n Praised by some while more defend.\n On storm and wind and mountain peak\n My form is known but still unique.\n\n Who am I?"
 gaeldom.9.a: "A phoenix!"
 gaeldom.9.b: "A dragon!"
 gaeldom.9.c: "A leviathan!"
 gaeldom.10.t: "Dead End?"
 gaeldom.10.d: "Unfortunately, our research efforts following the trail of the answer to the previous riddle have proven in vain and the trail has gone cold. We can only conclude that our guess was wrong."
 gaeldom.10.a: "Damnation!"
 gaeldom.11.t: "The Second Riddle"
 gaeldom.11.d: "The research team has deciphered the following riddle describing where the mysterious figure may be found:\n You may march a thousand miles yet never leave me\n Yet take one step and I am gone\n You can forever attempt to approach me\n Yet arrival has already been achieved. Where am I?"
 gaeldom.11.a: "The Stonehenge!"
 gaeldom.11.b: "The Tree of Life!"
 gaeldom.11.c: "The University of Oxford!"
 gaeldom.12.t: "Dead End?"
 gaeldom.12.d: "Unfortunately, our research efforts following the trail of the answer to the previous riddle have proven in vain and the trail has gone cold. We can only conclude that our guess was wrong."
 gaeldom.12.a: "Damnation!"
 gaeldom.13.t: "The Dragon Albion"
 gaeldom.13.d: "No sooner does [Root.Monarch.GetTitle] [Root.Monarch.GetName] speak the answer to the riddle -- 'right here, at the University of Oxford' -- does realization dawn!\n 'Furthermore, whoever this may be is right here in this room. It's you, isn't it?'\n [Root.Monarch.GetTitle] [Root.Monarch.GetName] points at the old, wizened scholar who has lead the investigation thus far.\n 'And to think, you were leading a search for yourself all this time!'\n\nThe old scholar starts clapping his hands even as his appearance shifts into a more youthful, neither quite male nor female figure who seems to emit their own light.\n 'Bravo, bravo! Thou art most discerning, [Root.Monarch.GetTitle] [Root.Monarch.GetName], and We commend thee for finding me. You may call Us Albion, and indeed We were the forefather of the Pendraigs back when We were but a young Wyrm. Back in Our hotheaded days, We sought to accumulate wealth and power, and viewed this entire isle as Our domain. Well, We still do, but Our hoard now consists of the knowledge gathere in this fine University. As a reward for amusing Us in our boredom, you and your successors may call upon Us in thine hour of need, provided a suitable price is paid.'"
 gaeldom.13.a: "Well, I guess a dragon is the true headmaster of Oxford?"
 gaeldom.14.t: "The Storyteller"
 gaeldom.14.d: "She comes to town when harvest ends\nWith stories wrapped in velvet bags\nThe children gather, make amends\nWith coins and bread and colored rags\n\nBut every tale she tells comes true\nWithin a fortnight, maybe three\nThe heroes die, the lovers too\nExactly as they're meant to be\n\nTell me a story, make it bright\nBut know the price before you pay\nEvery story comes to life\nIn the most twisted way\n\nA girl once begged for fairy tales\nOf princes brave and kingdoms won\nBut when the story's magic pales\nHer prince lay dead, her kingdom done\n\nA merchant asked for tales of gold\nOf treasures found in distant lands \nThe story played out as foretold\nBut gold turned dust between his hands\n\nTell me a story, make it bright\nBut know the price before you pay\nEvery story comes to life\nIn the most twisted way\n\nShe never meant to curse the words\nShe only wanted to bring joy\nBut fate's a beast that can't be heard\nAnd stories are its favorite toy\n\nNow she tells tales of simple things\nOf bread that rises, rain that falls\nOf ordinary happenings\nThat won't destroy us after all"
 gaeldom.14.a: "A Tale of Wealth"
 gaeldom.14.b: "A Tale of Power"
 gaeldom.14.c: "A Tale of Courage"
 gaeldom.14.e: "A Tale of Simple Things"
 gaeldom.18.t: "Disappearing Gold"
 gaeldom.18.d: "The wealth we were foretold in our story did come to pass. But now that the story has ended, it has all evaporated as if it never existed!"
 gaeldom.18.a: "Alas!"
 gaeldom.19.t: "Intoxicating Power"
 gaeldom.19.d: "Our story of power and control did indeed come to pass. But it would appear that many others have become poisoned by ambition and desire that power too, and have begun challenging our rule at every turn!"
 gaeldom.19.a: "Disaster!"
 storyteller_overconfidence: "Suicidal Boldness"
 gaeldom.20.t: "Overwhelming Courage"
 gaeldom.20.d: "Our story of courage and prowess in battle did indeed come to pass. But the courage did not end after the foretold deed was achieved; our ruler has continued throwing themselves recklessly into every occassion, and so have the rest of our soldiers!"
 gaeldom.20.a: "RIP"
 gaeldom.21.t: "Price of a Boon"
 gaeldom.21.d: "Ach, so you have come seeking a boon! But you must know, a Dragon's Boon does not come cheap. There are some conditions to be met, unless you happen to be my favorite child Tek..."
 gaeldom.21.a: "Give Albion extra-legal powers"
 gaeldom.21.b: "Divert scientific resources to Oxford"
 gaeldom.21.c: "Purge disfavoured officials"
 gaeldom.21.e: "Demonstrate our superiority"
 gaeldom.21.f: "On second thought, not now"
 albion_sweeping_powers_tt: "No Dragon likes to be questioned in their decisions. §JAlbion§! demands to operate without any of the red tape and regulations of modern government."
 albion_scientific_divertment_tt: "No Dragon can resist adding to their Hoard, and §JAlbion§! hoards knowledge. A copious offering of research grants and lab equipment should appease Them."
 albion_purge_tt: "For one reason or another, §JAlbion§! has kept a list of officials who They deem incompetent or who have offended Them somehow. We could remove these from office, or worse."
 albion_humiliation_war_tt: "§JAlbion§! is pleased by a demonstration of superiority and military prowess. It also gives Them a chance to test some experimental weapons technology."
 sought_boon_from_albion: "Recently Sought Boon from Albion"
 albion_military_advisor: "Military Education by §JAlbion§!"
 gaeldom.22.t: "Albion's Boon"
 gaeldom.22.d: "Very well! Name the boon that you would request of Albion."
 gaeldom.22.a: "May your wisdom guide our administration!"
 gaeldom.22.b: "May your battlefield prowess lead us to victory!"
 gaeldom.22.c: "May your experience train our officer corps!"
 albion_request_boon_title: "Request Boon from §JAlbion§!"
 albion_request_boon_desc: "We may request a Boon from The Dragon §JAlbion§!."
 albion_sweeping_powers: "§JAlbion§!: Sweeping Legal Powers"
 albion_scientific_divertment: "§JAlbion§!: Diverting Scientific Funding"
 gaeldom.23.t: "The Last March"
 gaeldom.23.d: "The horns of war have broken dawn through silver leaves and morning mist.\nOur brothers take their blades and march to battles that should not exist.\nA thousand years of peace now gone like autumn fires turn to ash.\nThe elders weep behind closed doors while young ones hear the metal clash.\n\nWe are the children of the ancient trees. \nOur arrows fly on winds of sorrow.\nWe fight for what we'll never see. \nA world that waits beyond tomorrow.\n\nThe men in iron cross our lands with fire in their mortal eyes. \nThey burn the groves where magic sleeps and turn our songs into goodbyes. \nBut we remember deeper truths than steel can ever hope to know. \nThe forest speaks in whispered words of where the fallen heroes go.\n\nWe are the children of the ancient trees. \nOur arrows fly on winds of sorrow. \nWe fight for what we'll never see. \nA world that waits beyond tomorrow.\n\nStarlight fades and morning breaks. Will any of us find our way\nback to the halls where laughter lived before this gray and bitter day?\n\nWe are the children of the ancient trees. \nOur arrows fly on winds of sorrow. \nWe fight for what we'll never see. \nA world that waits beyond tomorrow.\n\nThe horns of war have broken dawn through silver leaves and morning mist.\nOur names will live in woodland songs after we have ceased to exist."
 gaeldom.23.a: "We honor their dedication..."
 unlocks_children_of_the_forest_tt: "We will have access to the §GChildren of the Forest§! §Yunique mercenary company§!!"
 merc_children_of_the_forest: "§GChildren of the Forest§!"
 gaeldom.25.t: "Witch of the Crossroads"
 gaeldom.25.d: "Meet me where the four roads meet, when the moon is dark and thin.\nI've got answers to your questions, but the price is what's within.\nStanding on this roadcross, since before your grandpa's name.\nEvery soul that comes here seeking, leaves here never quite the same.\n\nYou can try to walk away now, turn around and just go home.\nBut you wouldn't have found me, if you weren't already alone.\nI can see what drives you here, all the things you can't forget.\nAll the wounds that never healed, all the tears you haven't wept.\n\nI'm the witch of the crossroads, I'm the deal you shouldn't make.\nBut you'll make it just the same, for your poor heart's aching sake.\nWhat you want, I can give you; what you need, I understand.\nBut remember, when you're choosing, nothing's free in my promised land.\n\nPower for your empty hands, love for your broken heart, vengeance for your enemies.\nBut first we gotta start: with a little blood for binding, just one lock of your sweet hair, and a promise you'll remember every choice that brought here.\n\nI'm the witch of crossroads, and you already made your choice.\nWhen you stepped into my circle, you gave power to my voice.\nWhat you want I have given, what you need you understand.\nNow you're bound to keep returning, to my dark and promised land.\n\n Meet me where the four roads meet, when your debt is due again.\n I'll be waiting at the crossroads, with my needle and my pen."
 gaeldom.25.a: "The Strength to seek Vengeance"
 gaeldom.25.b: "The Charisma to make all Adore me"
 gaeldom.25.c: "The Power to assert Dominance"
 gaeldom.25.e: "Back away from the Crossroads..."
 gaeldom.27.t: "The Price to be Paid"
 gaeldom.27.d: "You do not know if you are awake or if you are dreaming, but once again you find yourself at that dark, fateful crossroads. And there she waits, and she beckons to you with one crooked finger...\n\n Oh how I wish I could taste as you humans do, and enjoy the flavors of the mortal realm..."
 gaeldom.27.a: "Pay the Price"
 lost_taste_tt: "All of our food-related trade goods have become practically worthless..."
 gaeldom.28.t: "The Price to be Paid"
 gaeldom.28.d: "You do not know if you are awake or if you are dreaming, but once again you find yourself at that dark, fateful crossroads. And there she waits, and she beckons to you with one crooked finger...\n\n Oh how I wish I could feel the fiery passions you mortals do, love and hate as you would..."
 gaeldom.28.a: "Pay the Price"
 gaeldom.29.t: "The Price to be Paid"
 gaeldom.29.d: "You do not know if you are awake or if you are dreaming, but once again you find yourself at that dark, fateful crossroads. And there she waits, and she beckons to you with one crooked finger...\n\n Oh how I wish I could dream as mortals do, slip into that blissful sleep and awake into reality..."
 gaeldom.29.a: "Pay the Price"
 gaeldom.30.t: "The Price to be Paid"
 gaeldom.30.d: "You do not know if you are awake or if you are dreaming, but once again you find yourself at that dark, fateful crossroads. And there she waits, and she beckons to you with one crooked finger...\n\n Time... How much do you value time? It must be so valuable to one so mortal, and yet so fleeting..."
 gaeldom.30.a: "Pay the Price"