 druidic_brotherhood_title: "Druidic Brotherhood"
 druidic_brotherhood_is_our: "Our Druidic Brotherhood"
 druidic_brotherhood_title_plural: "Druidic Brotherhoods"
 druidic_brotherhood_long_desc: "Druidic Brotherhoods are improved marches who only take into account their own strength for the purposes of Liberty Desire. They cannot be annexed nor turned into vassals."
