 antitheist_group: "Anti-Theist"
 abolitionist: "Abolitionist"
 abolitionist_religion_desc: "What use are gods who do not protect us from great disasters? Worse, the gods may have CAUSED these great disasters, and callously ignored the mortal costs of their divine conflicts! For their crimes against humanity, the collective divines deserve to die, and we will be the ones to kill them, by Abolishing their churches, destroying their Icons, and ending the faith that they so crave and require for their power. Even if they cannot die, we shall starve these heavenly tyrants into powerless husks!"
 reformed: "Calvinist"
 protestant: "Templarite"
 protestant_religion_desc: "The Templarite faith is a response to the lack of unity within Christendom in the face of heathen encroachment. Denying the authority of both the Polish and German Popes, neither of whom has ever set foot in Rome, Templarites are dedicated to the ideals of Crusade and the defence of the faith and holy lands. Templarite rulers are supposed to cooperate to push back against the hordes of the heretics and heathens, thus giving them an opinion boost to each other while decreasing diplomatic relations with other religions."
 anglican: "Irenicist"
 anglican_religion_desc: "Desiderius Erasmus was a Christian humanist and reformer, in the sense of checking clerical abuses, honoring inner piety, considering reason as meaningful in theology as in other ways. He also promoted the notion that Christianity must remain under one church, both theologically and literally, thus denouncing the split situation of the Catholic Church and the Templarite reformation alike. Since his time, Irenicism has postulated removing conflicts between different Christian creeds by way of mediation and gradual amalgamation of theological differences. \n Due to a lack of a supranational clerical leadership, unlike Catholicism or Templarism, Irenicist churches are typically subject to their respective national governments, and thus popular among rulers for guiding public opinion and encouraging industrious behavior."
 diplomats_of_the_reformation_aspect_tt: "Increases the opinion of all §YHeretic Christian§! countries by §G50§!. Capped at 100."
 diplomats_of_the_reformation_aspect: "Pacifist Diplomacy"
 desc_diplomats_of_the_reformation_aspect: "Irenicism stresses the importance of debate and peaceful resolutions to disagreements, with force being a last resort. Let our diplomats stress this point and gain trust throughout the courts of Christendom as mediators."
 cathar: "Cathar"
 catholic: "Catholic"
 fraticelli: "Deutsch Katholisch"
 fraticelli_religion_desc: "Following Rome's fall to Antioch in 1415, the Pope fled to Poland, where the Polish Crown granted them a new papal state around Gdansk. However, the Saxons were furious that the Church was now under the influence of their historical rivals, and thus they declared the Gdansk Pope a false pretender. Instead a Saxon Pope was declared, leading to the Western Schism between pro-German and pro-Polish Churches."
 waldensian: "Waldensian"
 lollard: "Jade Dragon Cult"
 lollard_religion_desc: "The Cult of the Jade Dragon was formed in the chaos of the Xizho migration from China to its new homeland in Antioch. Syncretising Nestorian Christianity with local Buddhist, Hindu, Muslim and Zoroastrian traditions, it calls upon a great Mahdi, the Dragon of Judah, to conquer the material world, while Jesus Christ conquers the grave. Originally formed by missionaries attempting to appeal to large hostile populations, it is now propagated by large warlord kings in Dravidia, though it reels from persecution in the Mamluk empire."
 hussite_religion_desc: "Following Rome's fall to Antioch in 1415, the Roman Church fragmented into Polish and German Catholics. Johann Hus, a kin of the Babenberg dynasty in Vienna, unified Bavarian and Austrian bishops, protesting papal disregard for Southern Germans. Disenchanted with both Papal factions by 1430, they birthed the Hussite faith, divided between Utraquists and Taborites over the fate of the papal hierarchy."
