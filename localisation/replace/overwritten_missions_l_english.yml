l_english:
 EVTOPTA9470: "Take that, Merovingians!"
 EVTOPTB9470: "The Blood is Strong"
 dynastic_events.8.a: "At least it is not the Merovingians."
 dynastic_events.8.b: "M.E.I.O.U."
 obj_christian_convert: "Embrace Millennialism"
 obj_christian_convert_desc: "It is time to usher in a new era!"
 flexible_negotiation: "Proactive Public Relations"
 flexible_negotiation_desc: "It is necessary to invest in our reputation as a benevolent power and honorable ally, such that slander about our so-called aggressive expansion find no tractions among the doubters."
 state_propaganda: "Ruthless Negotiators"
 state_propaganda_desc: "Our 'peace' envoys are armed with the most vile blackmail and give not an inch when it comes to extracting maximal concessions at the negotiating table."
 lva_legacy_of_the_knights_desc: "The Livonian Brothers of the Sword conquered this land in the name of Christ, and we have not forgotten their sacrifices nor their dedication to achieve these victories."
 lva_religious_tolerance: "Baltic Crusade"
 lva_religious_tolerance_desc: "We came into existence to spread the word of God to the pagan. Now, we must spread the word of God to those who believe in Him the wrong way."
 trade_protectorate: "Protectorate"
 trade_protectorate_long_desc: "A protectorate is an autonomous subject type that cedes some of its sovereignty in religious and trade matters to a stronger power in exchange for its protection and favored status in information sharing."
 trade_protectorate_is_our: "$NAME|Y$ is our Protectorate"
 trade_protectorate_title: "Protectorate"
 trade_protectorate_title_plural: "Protectorates"
 is_trade_protectorate: "Is Protectorate"
 mechanic_can_establish_trade_protectorates_yes: "§YCan Establish §YProtectorates§!!"
 diplomatic_corps_desc: "Through the establishment of a professional Diplomatic Corps we ensure that the lessons of senior diplomats are passed on to the younger generation.\n\n Unlocks the ability to §Yform heathen royal marriages§! if we are a monarchy!\n"
 
 hun_the_anatolian_threat_title: "Reclaim Transylvania"
 hun_the_anatolian_threat_desc: "During the weakness of our Crown under the Polish rule, the Transylvanian nobles broke away from our control or were conquered by nomads from the Cuman steppes. It is time to re-assert our rulership over the region."
 hun_liberate_bulgaria_title: "Protect Bulgaria"
 hun_liberate_bulgaria_desc: "Bulgaria has long been fated to be ruled by one foreign conqueror or another. It's time to bring them under our wing so we can protect them properly from yet another foreign conqueror."
 hun_push_on_to_constantinople_desc: "The great city of Constantinople stands threatened by the Xizho hordes. The decadent Romans are in no position to protect their capital any longer, and thus the tasks falls upon us, the great Balkan Bulwark, to protect the straits against the Dao-Hellenic invaders."
 hun_bulwark_of_christianity_desc: "As the principal defenders of Europe against the Xizho threat, we have come to be known as the Bulwark of Christianity. By demonstrating our ability to defend the Balkans against anything they may throw at us, we shall prove ourselves worthy of such a title!"
 hun_the_hungarian_succession_desc: "The near extinction of the venerable House of Piast has left both Poland and Hungary in a crisis of leadership. We must sort out our succession issues to regain strength and turn our eyes back upon expansion."
 hun_overshadow_austria_title: "Humiliate Germany"
 hun_overshadow_austria_desc: "More than just taking a vital city, conquering and holding Vienna shall prove that the Germanic Crown's claim to de jure rulership over all German peoples is empty. A new empire has risen!"
 hun_deal_with_the_impaler_title: "Deal with Wallachia"
 hun_deal_with_the_impaler_desc: "The Wallachians have always played a tricky game, switching sides between the Poles, Hungarians, and Romans to obtain the greatest benefits in their precarious situation. Enough is enough -- it is time to bring them firmly under our control."
 hun_the_despotate_of_serbia_desc: "The Serbians have always tried to play us off against the Romans and Venetians that also desire their land. This has lasted long enough -- if they want our protection, they must show us proper fealty."
 hun_jagiellonian_union_title: "Old Piast Union"
 hun_jagiellonian_union_desc: "We should rekindle the old ties we shared under the House of Piast, but this time under our leadership."
 hun_old_alliances_desc: "Hungary and Poland have been ruled as one under the House of Piast for a long time. However, many of our nobles resented this situation, as Hungary was seen as the junior partner in this relationship. If this relationship is to end, we must re-evaluate our relations with the Poles."
 
 # Persia stuff
 per_end_the_turkish_threat_title: "End the Rhoman Threat"
 per_end_the_turkish_threat_desc: "Our march into Anatolia has not ended yet. As long as the Eastern Roman Empire, with its long history of enmity with Persia, has a foothold beyond the Bosporus, our Empire is under their threat. We shall drive them out of Asia and secure our security with their blood."
 per_end_the_turkish_threat_ct: "No province in §YAnatolia§! is held by any §YByzantine§! country which is NOT our subject."
 per_protect_the_west_iranian_tt: "Every owned province in the §YPersia§!, §YAnatolia§!, and §YMashriq§! regions which is of the §YIranian§! culture group gains the following effects:"
 per_butcher_black_sheep_title: "Expel the Caliph"
 per_butcher_black_sheep_desc: "The decadent Abbasid dynasty has menaced the borders of Iran for far too long. No longer shall these arrogant caliphs lord over our people!"
 arl_conquer_shirvan_title: "Conquer Northwards"
 arl_conquer_shirvan_desc: "Consolidating the lands to our north is a necessary step towards solidifying our control of the region."
 arl_conquer_tabriz_title: "Conquer Westwards"
 arl_conquer_tabriz_desc: "Occupying the cities to our west will greatly demonstrate our strength and rightful control over Persia!"
 
 # Horde stuff
 mongols_tumu_crisis_title: "Vengeance at Zhongdu"
 mongols_tumu_crisis_desc: "Our great empire was shattered by the disaster at Zhongdu when the Jin turned the full power of the fire-lance upon us from their walls. But they have grown weak, and their own vast empire of China has collapsed into division. Now is the time for vengeance!"
 mongols_revenge_against_timur_title: "Seize Samarkand"
 mongols_revenge_against_timur_desc: "The city of Samarkand is located on a vital artery of the historial Silk Route and is crucial to controlling the region of Khorasan. We should seize the city for ourselves!"
 moghulistan_revenge_against_timur_title: "Seize Samarkand"
 moghulistan_revenge_against_timur_desc: "The city of Samarkand is located on a vital artery of the historial Silk Route and is crucial to controlling the region of Khorasan. We should seize the city for ourselves!"
 
 # China stuff
 qng_three_feudatories_desc: "As our campaign reaches further south into China, we must consider whether it would be easier, at least in the short term, to delegate rule in the South to Han governors willing to bend the knee to our rule. We must find some way to exploit the situation in the South."
 qng_incorporate_han_desc: "Conquering the Celestial Realm is no easy task. Defeating their pathetic generals and lackluster troops may well prove to be the easiest part of this great task, as their people number in the millions, and so we must find some way of ruling over them in some cooperative manner."
 qng_balance_mandate_desc: "After the failures experienced by previous, subpar emperors, we will bravely fill the power vaccuum of the Celestial Realm and claim the favor of the Heavens in our name!"
 qng_campaign_in_burma_desc: "Yet more Han rebels have fled to the hills of Burma, seeking refuge among the Shan and Bamar chiefs. We must show them there is nowhere to hide from those who righteously hold the Mandate!"