 koi_purrpose_mission_completed_flag: "Completed Mission Purrpose"
 #events
 catt.1.title: "A Rowdy Society"
 catt.1.desc: "Despite cats being some of the smartest creatures around, influenced by the powers of the Fae, we seem to have taken all the wrong lessons from humanity and mixed those with our primal instincts. Composed of housecats, wildcats, and the Cat-sìth, all with their own goals and ambitions, the island nation does not see much stability. The Cat-sìth make up the druid class of our society, with the heavy burden of hiding the secrets of the Druidic Otherworld. Some other Cat-sìth are more rogue and selfish in their actions, choosing to be aggressive and territorial over vast swathes of the island, making up the nobility. While the humble yet vital task of overcoming the fear of vast waters for trade of resources the island doesn't possess is reserved to the housecats and wildcats, making up the merchant class.\n\nA significant chunk of the population loosely organizes itself under a Cat-sìth noble into clowders, causing disturbances in everyday life. The so called 'head' of the country is a Cat-sìth leading one such clowder, which due to endlessly shifting power dynamics doesn't stay for long. Humanity sees us as lesser, many surrounding christians condemning us as spawn of Satan, with only the druids of Gàidhealtachd seeing us as more than fur coated pests, even if we had squabbles in the past over many topics.\n\nThings need to change and fast if we don't want the Tree of Life to be destroyed and the religion of Druidism to be snuffed out under uncaring, christian boots disrespecting Mother Nature everywhere they tread."
 catt.1.a: "A difficult time to be a cat..."
 catt.1.tt: "As long as cat clowders continue infighting, we will remain §Rheavily destabilized§!, with our feline rulers being culled at random and all governance outside of the capital being nigh unthinkable."
 catt.2.title: "Bloody Takeover!"
 catt.2.desc: "And as the rulers of Catt got comfortable in their seat of power, their Cat-sìth firmly believing that the thunder has passed, the wheel turns once more. $MONARCH$ $DYNASTY$ and key members of their clowder have been assassinated, with a new clowder taking hold of the few key locations present on the Isle, declaring themselves the new government with the new Cat-sìth already meowing out orders to their subordinates.\n\nWill the new leading clowder be able to turn the nation around, or end up like the endless line of clowders before them?"
 catt.2.a: "Everybody Panic!"
 catt.3.title: "And we Shall Run Free"
 catt.3.desc: "The vast bodies of water have made us relatively safe in the face of human encroachment, being seen as not worth the resources or planning, but it has locked us in. Do we want to remain isolated on a small, cold island and soon enough, be forgotten by history itself?\n\nNay! It is not meant to be! $MONARCHTITLE$ $MONARCH$, leader of the current strongest clowder, has managed to appease the most aggressive competing clowders temporarily and gathered up the resources to send out an expedition. The few willing felines, led by Oscar Do-bàthadh, the only feline reported to have survived not one, but multiple shipwreckings, will be sent out and search for a new home, while we wait with bated breath and flattened ears for their return."
 catt.3.a: "All Claws on Deck!"
 catt.3.tt: "For as long as we have enabled £icon_ideas£ §YExpansion Ideas§!, we will gain a §Jpowerful modifier§! for our colonizing endeavors."
 catt.4.title: "A Change in Production?"
 catt.4.desc: "After long months of arguing, making concessions and pleasing the Druids, we have been rewarded with the blessing to change the natural produce of the island. While they gave us the permission in a rather hesitant manner, all that matters is that now, we can focus our fierce energy onto more than just hunting fish at the shore.\n\nWhat shall we choose?"
 catt.4.a: "Eating fish makes for healthy minds"
 catt.4.a.tt: "Trade good won't change and we will intensify and streamline seafood hunting."
 catt.4.b: "Yarn, we need to socialize our young properly"
 catt.4.c: "Catnip. Right this second. This is an order."
 catt.90.title: "Civilization beyond the Great waters"
 catt.90.desc: "We have seen it. A new, previously undiscovered land. It was a cold, sad land, barely of any interest to us for our future inhabitance, yet it was real, tangible land, it gave us hope that our irises weren't playing tricks on us. But as we were sailing along the shore, we heard something terrible.\n\nA great bellow came from beyond the coastline, sounding like thousands upon thousands of war horns being blown at once, announcing war, nay, doom for us all, the Mist itself warning us from continuing any further. Every single instinct in our body told us to flee, and we listened. Many of our brave sailor cats report never wanting to return to the sea, speaking of the event as if they got a hairball stuck down their throat, tail flicking nervously with eyes dilated in abject horror."
 catt.90.a: "Yet our spirits cannot be crushed."
 catt.90.tt: "We will leave the New World alone for the Gaels to handle and search elsewhere, preferably with little human inhabitance..."
 catt.91.desc: "A warmth never felt in the Isle enveloped both our senses and our ships a few months after setting sail from our home. Could this be it? Could this be where we find our place in the material world? A hidden paradise on Earth maybe? And as we all pondered such questions, we soon saw land on the horizon.\n\nBut to our disappointment, what we found were humans, and they were inviting us to dock. As we complied, hoping to get a few questions answered, we took a look around. People were beginning to crowd up next to our ships, most of them seeming to not have eaten for a long time, looking at us with hope shining in their eyes. A representative dressed in a military uniform came forward, mayhaps a queen or a military leader. She called out to us asking if we are here for the purpose of a 're-supply mission from the Celestiel Hellenic Empire and his Majesty, Prince Yangshing Chen'.\n\nThe uneasy tension quickly snapped once we shook our heads, the crowd going into a frenzy, banging on the hulls of our ships, climbing, yelling out in desperation. We managed to sail off right before any of them could board our ships. Many of our brave sailor cats report never wanting to return to the sea, speaking of the event as if they got a hairball stuck down their throat, tail flicking nervously with eyes dilated in abject horror."
 catt.92.desc: "We sailed south, past Cape Verde, past the waters which have been known to Europeans for centuries, and we made a gambit. From West Africa, if we sail further west, we must hit land, or be doomed to die. The climate is way too tropical for our liking, but it's better than the feared, endless frost to the north of our homeland. After months of disease and getting used to the climate, we saw a coast.\n\n'Why are there Roman style building here?' I heard a sailor cat ask. The sight was majestic, the city looking as vast and grand as stories of old would lead you to believe. In the midst of our gawking, we haven't even noticed that we were spotted, a giant fleet only imaginable during a good afternoon nap was rapidly approaching, wearing the flag of the Romans. We had to flee in terror, for noone wanted to know the fate that awaited us.\n\nWhen the fleet returned home, the crew was a shell of it's former self, many sailor cats dying from the unfamiliar climate and lack of supplies for such a long journey."
 catt.5.title: "Following Instructions"
 catt.5.desc: "I, Connla Glano, have been personally selected by the Druidic council of Gàidhealtachd for the great journey to uncover the secret to entering Tír na nÓg. While the council seems to fully trust the Cat-sìth with instructing me correctly on the journey, I cannot help myself but distrust them. Centuries of trickery, secrecy and stealing the souls of the dead before they can peacefully pass on all give me good reasons to. All I was given on the Cat overran Isle was a supposedly 'enchanted' boat called An Mhór Thall, a direction to sail to, and a few days worth of supplies with a warning to not disturb or interfere in the actions of any animal, no matter how much I want to.\n\nIt's been 3 days since I started this journey, and the situation feels hopeless. Most of my food was picked apart by seagulls in the morning of day 2, yet I could do nothing but watch. My sleep has been interrupted continuously by an underwater beast ramming the boat, as if it wanted to deprive me of sleep. Worst of all, I have seen no land ever since I took sail, as if the entire Earth sank and left me out on the ocean to suffer and ponder. When all hope seemed lost, a blinding light enveloped me. It wasn't meneacing or harmful, it was more akin to a soothing afternoon breeze, almost speaking to me, telling me to go onwards. And I followed. No matter where I looked, the light kept pervasively shining into my eyes, the sun bending and twisting to make sure I would see what's on the other side. The light soon left, and before my eyes, a grass field, colored emerald green.\n\nIt was all true. When I was sent back to Domhan by Tuatha Dé Danann, I came back a changed man. I must return to the council and relay everything."
 catt.5.a: "The secret is out. We must safe-guard it from all who wish to destroy it"
 catt.5.b: "We must be responsible with this monumental find"
 koi_tir_na_nog_revealed: "§GWe have revealed the secret to paradise! Access will remain heavily restricted in order to not anger the Gods. Glory to Druidism!§!"
 hsc_tir_na_nog_revealed: "§GGlory to Druidism!§!"
 catt.7.title: "Foreseen Cat-astrophe"
 catt.7.desc: "'Afternoon naps are the best. Afternoon naps in the warmth of the sun are even better. But afternoon naps on a stone warmed by the sun? The best. Noone can dispute that. But mine was disturbed by the loud marching and chatter of the local militias, loyal to the Ceannard. I was ready to groan and complain right to their faces, until I saw they were going to the local Cat-sìth nobles residence. Curiosity never killed the cat, so I got up and quietly followed. What I saw was horrific, even for my tastes. To make it short, they broke down the enterance and murdered the Cat-sìth in cold blood. I was scared, confused, skittish and could not help but run away from the scene, I cried and cried to anyone who was nearby about what had just taken place, and soon, everyone scattered. To take up arms, or to hide, I didn't care, I had to run.' - Seumas Sníomh, port of Baile Laochra\n\nIt is unknown if that was the first murder, but it was the one which leaked into the wider public and started a wildfire across the nation. Backed by the merchant classes made up of the so often overlooked cat species, with the druids standing by the sidelines, $MONARCHTITLE$ $MONARCH$ has begun a purge of the Cat-sìth nobility and their supporters. Cat-sìths everywhere are afraid they are going to be next, and thus are rallying their clowders, taking up arms and making aggreements between each, uniting together their clowders to resist and revolt, screaming about 'injustices' and 'liberty', as if they knew what that means."
 catt.7.a: "Continue, all of Hydra's heads must be cut off at once."
 catt.8.title: "Conspiring Cat-sìth Revolt"
 catt.8.desc: "Our unpleasant treatment of the land-owning Cat-sìth has caused them and their supporters to get all uppity. Do they not see they are disturbing my state mandated nap?"
 catt.8.a: "De-claw each and every one of them"
 catt.9.title: "Return of Cath Palug?"
 catt.9.desc: "Cath Palug, a legendary figure in our mythology, the only cat who was consistently able to stand up to humans with her hidden monstrous form. We thought that she was long dead, slain by Kay, the foster brother of the Briton king, Arthur Pendragon. Were those stories made up? Was she who she proclaimed herself to be? Manifested herself again through the Fae? It matters not, for she has already managed to get much of the army threatening to revolt against us if we don't grant her leadership position of the nation."
 catt.9.a: "She is an able ruler, She will do well"
 catt.10.title: "Live Long and Pawsper"
 catt.10.desc: "After a long, multi-year borderline civil war, we have done it. The average cat has risen up for itself and dethroned Cat-sìth enforced land codes and social structures. $MONARCH$ has filled the promise made to the estates, relinquishing Emergency Powers over the nation. Now that the chains holding us back from our true purpose in the world are broken, the merchants and druids shall step in to build a new, greater feline state."
 catt.10.a: "We shall be the Envy of the World!"
 catt.10.tt: "§MWith the druids and merchants taking control, we will be given a new powerful system of government!§!\n\n§RThe rough way we went about bringing together our new Utopia will leave some scars on the land..."
 catt.11.title: "Humans in a Parallel Society?"
 catt.11.desc: "With humanity becoming more prominent in our trade network, our government structure, our administration, many of our citizens, especially the more nature loving wildcats have seen this as a mistake. Not as a mistake to be entirely reversed, but as a mistake with which we steer ourselves into an utopia where all felinekind are safe under our banners. The housecats have a relaxed, casual approach of further integrating ourselves with human ideas and politics, as equals.\n\nWhich approach shall we pick? §R(WARNING: THE OPTIONS HERE WILL LOCK YOU INTO ONE OF TWO PATHS!)§!"
 koi_nothinghappens.tt: "We will continue steering ourselves into greater cooperation, and possibly eventual §Mhuman integration in the future.§!"
 catt.11.tt: "§PHave you all lost your damn minds?! Our place in the world is still not secure!!§! §MAnd we must enlighten all other cats in the world to accomplish the task!§!"
 catt.11.a: "Take the Housecat Approach"
 catt.11.b: "Take the Wildcat Approach"
 catt.12.title: "Curiosity killed the Cat"
 catt.12.desc: "'It was a dreamy and quiet morning in the outpost, and we got ready for another day of making intentionally unfair deals to line our own pockets. Nothing could have prepared us for what the human traders presented us with. My other partners got sick from the sight. Furs. Furs from felines as far as the eye could see. Tens if not hundreds of individuals must have been poached for this sight to be a reality, and as we stood there in shock, the humans went down on us for our practices and the actions of our state. Frightened and cornered, we ran off into safety and began preparing a report back to the capital.' - Seacht-déag Stríoc, Wildcat Merchant\n\nWe have received similar reports all across our trade network, with humans intentionally taunting and intimidating our merchants. Rumor has spread around that due to our aggressive push for cat dominated spaces, humanity has begun seeing trophies and furs from the Feliade as highly prized, advertized as 'resistance against the unfair and evil species'. This is obviously a major concern, as if the less enlightened Felinekind get wiped out, the balance of Mother Nature will be harmed. From now on, we must proactively search for our vast bretheren, both for protection and introduction to the blessings of the Fae."
 catt.12.tt: "§REvery known nation will get -100 opinion of us!§!\n\n§TUnlocks decisions to rescue and Fae-atune Felidae species, granting us permanent bonuses and leading to the unification of Felinekind!§!"
 catt.12.a: "§PWe cannot let this stand!§!"
 catt.13.title: "Rescuing the Egyptian Mau"
 catt.13.desc: "Sneaking past the Xhizo military presence has been difficult, but that's why we mapped out the city of Cairo to the tiniest detail. Every street, every building, every patrol time and patrol switch, documented and accounted for. We approached a building marked with symbols unknown to us, but it should be where runaway pets are kept till their owners reclaim them. We hopped in through an open window, making sure to remain quiet. The second we were inside, we felt a hundred gazes pierce through us, and from the relative darkness, we heard a voice: 'You're finally here.'\n\nThat's how a long dialogue between us and the Egyptian Mau started. The Egyptian Mau possesed greater intellect, but the source of theirs wasn't comparable to ours. They talked about Ancient Times, lamenting about how their treatment has worsened since the days of forgotten Egyptian Gods.\n\nAfter some time of letting the group ramble on and on, entirely full of themselves, they gave us a deal: 'Treat us like royalty like we once were, and we shall bless you with the symbol of the Eye of Horus, no matter how weakened it has become.'"
 catt.13.a: "Deal!"
 catt.14.title: "Big Cats in the Army"
 catt.14.desc: "The representatives of every recently Fae-atuned big Cat species huddled in front of $MONARCH$ $DYNASTY$, invited forth for negotiations regarding their role in the Catt society, and furthermore, the army. For the big Cats possesed something which the Wildcats, Cat-sìths or Housecats never possesed: Enough physical mass and strenght to take down large prey animals on their own. This was undeniably a useful trait with a huge drawback, being the long time it takes for big Cats to make offspring, making their numbers scarce compared to smaller Cats.\n\nWhat was agreed upon in the end were very limited Big Cat regiments used as shock troops, the same way humans used horses, with other regiments consisting of a few big Cat leaders to spearhead their smaller feline bretheren into a good position in the battlefield."
 catt.14.a: "Bravery refined and emboldened, strenght forever revitalized"
 catt.15.title: "Paws and Hands"
 catt.15.desc: "Humans are now the majority population in a ton of our settled land, with Feline overlords ruling over most of them. Over the years, we have seen an incredible thing happen. Humans instead of resenting us, have come to accept and cooperate with us on a deeper level than previously thought possible. With our approach, we believe it is time to finish what we started and think about integrating humanity into our armed forces."
 catt.15.a: "We will close the gap"
 catt.15.b: "It can wait"
 catt.16.title: "Our plans with Australia"
 catt.16.desc: "Back on the Isle, all the Catts are hopping onto prepared ships docked in newly built wharfs, hesitantly, but they are. As they heard of new, warm land to habitate in, without any humans telling us off or significantly challenging us.\n\nBut there are doubts. Do we really leave the Isle behind this easily? Should we use the lessons learned from settling this land to further appease the Gods and thus gain greater access to Tír na nÓg? The new capital could open up new opportunities like nothing has ever done before, but the decision is difficult."
 catt.16.a: "Australia will make for a nice vacation resort, nothing more"
 catt.16.b: "Onwards, to our new homeland!"
 catt.16.c: "I made a mistake, I want to go back home"
 catt.16.d: "Transport over the newcomers, we need all paws we can get here"
 catt.16.e: "[1090.GetName] will be the Iris of Felinekind!"
 koi_annex_aussie_CN_and_subjects: "We will annex all our subjects with their capital in §YAustralia§!"
 koi_aussie_cap_no_sydney: "Since we do not own §Y[1090.GetName]§!, our capital will be moved to a random §YCenter of Trade§! within §YAustralia§!."
 catt.17.title: "Realm-wide Trade Policy"
 catt.17.desc: "With our rising power in the East Indies, we need to decide on how to handle the money and influence we have obtained there. We could try our best to transport the wealth all the way to the Isles, but there are many vulnerable spots where our trade could get intercepted by our rivals. Another option is collecting it in the east directly, meaning lesser potential returns, but it's the safer option."
 catt.17.a: "All trade will arrive in the homeland of Druidism, no exceptions."
 catt.17.b: "We are far too splintered. Focus on localized trade collection."
 catt.18.title: "Month Long Journey"
 catt.18.desc: "The sunlight of morning hits my eyes,\nI did experience highs,\nI did experience lows,\nand soon my life will become written about in prose.\n\nWhether it's described in a folk tale,\nsurviving such a majestic Beast,\nor will it be spoken over a mug of ale,\n'Oh how foolish that Cat was, to give It such a feast.'"
 catt.18.a: "There is only one way to find out."
 catt.18.b: "Not yet."
 catt.18.tt: "Resets your Battles fought back to 0.\n\nA life dependant on the flip of a coin. Good luck."
 catt.19.title: "The General Returns (?)"
 catt.19.desc: "What came back to the Isle was unlike any Cat we have seen before. Pupils permanently dilated, ever diligent, constantly watching around itself. It's body rough, rugged and seemingly changed by the experience. When we tried to speak to the General, she immidiately silenced us: 'Don't talk, it's a weakness.' she whispered, almost petrified. We were ready to send her away, dismissing her survival as cowardice and paranoia, but the next day in the training fields, reports came back of her incredible fighting spirit and tactical might."
 catt.19.a: "At least she passed the Trials."
 catt.20.title: "Echoes of Silence"
 catt.20.desc: "A horrific sight waited for the high ranking military officers outside their camp today. A Cat skeleton, organized in a neat fashion on a piece of land where grass couldn't grow, showing visible signs of damage from what must have been a giant monster. Shaken by the sight, the officers took what remained of their general back to camp, before reporting that the Trials against Failinis have been a failure."
 catt.20.a: "A great shame."
 catt.93.title: "Wine Merchants form a Coaltion!"
 catt.93.desc: "Our shenanigans regarding the bathing of Failinis in order to obtain obscene quantities of wine have finally reached the boiling point, with several merchants of Iberia, Southern France and especially Franconia threatening us and badmouthing our wine for its 'bad quality' and 'it causes inner damage' nonsense. While we would like to keep this going, the threats to the other parts of our trade are too great to potentially risk damaging our entire reputation for."
 catt.93.a: "Oops, our bad."

 gaeldom.24.title: "Longevity in a Free Society?"
 gaeldom.24.desc: "$MONARCH$ $DYNASTY$ has been a good ruler of $COUNTRY$, safe-guarding republican values and being an example to all followers of druidism. With $MONARCH$s recent immortalization through being invitied to the Feast of Goibniu, as the years go by, the people notice a worrying trend.\n\n'$MONARCH$ $DYNASTY$ came to power when I was a young man in the military, and with the coming of my grandchildren, I fear that $MONARCH$ $DYNASTY$ may rule till they have their own grandchildren and beyond.' is a comment being spread across newspapers from a worried citizen, echoing the sentiment and whipping the populace into a panic over $COUNTRY$ fallíng into a dictatorship. The estates and regional governors are challenging central authority with cries to stand down and let another free and fair election take place."
 gaeldom.24.a: "I guess I have no choice..."
 gaeldom.24.b: "I feasted with the Gods, I have the right to rule this backwater country"
 gaeldom.24.tt: "§REach of our provinces has a chance to spawn a huge revolt!§!"

 #gov reforms
 cat_clowder_hierarchy: "Cat Clowder Hierarchy"
 cat_clowder_hierarchy_desc: "A cat society on the verge of total anarchy, the strongest rule while the weak grovel and scheme. The only constant is devotion and belief in Mother Nature."
 cat_clowder_tt: "Feline Society"
 cat_clowder_tt_2: "If you are reading this, hi."
 cat_clowder_tt_3: "If you are reading this, hi."
 clowder_tt: "Ceannard"
 monthly_catt_fawning: "Monthly Fawning"
 catt_fawning: "Fawning"
