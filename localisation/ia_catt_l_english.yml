 desc_koi_tir_na_nog_2: "Interconnected with the Gods, their influence is felt across the Isle. Visitations to Tír na nÓg have become less restricted, as anyone who would do harm to the Gods won't be able to enter in the first place."
 koi_city_of_endless_irises: "City of All Catts"
 desc_koi_city_of_endless_irises: "The grandest of Catt ammenities have been transported here, and being the single greatest hub of commerce, our influence is felt all across the Pacific and Indian oceans."
 koi_slightly_less_of_a_pussycat: "Naval Volunteer Force"
 koi_slightly_less_of_a_pussycat_subject: "Contribute Volunteers to the Mainland"
