 #missions
 koi_anarchy_aversion_tt: "\nMaybe we could spend these re-found treasures and volunteers on finding a §Owarm place§! to nap..."
 koi_capital_goods_tt: "\nThis event allows us 3 choices to either keep our current §Ttrade good§!, or change it between 2 other options.\n\nRegardless of the choice we make, we will get a different §Jpermanent bonus§!."
 koi_met_high_americans: "Has met an Advanced Civilization in the Americas!"
 koi_human_teachings_tt: "A proper agreement between Cat-sìth and the Gaels will be worked out over the next 5 years.\n"
 koi_successful_landing_tt: "\nSoon, we might be able to force ourselves into places with bigger human presence..."
 koi_prepare_reform_tt: "This modifier will stay as long as we haven't §Rpurged the clowders!§!"
 koi_clowder_reform_tt: "§RWe shall begin a multi-year process of purging the Cat-sìth who want to abuse their leverage for control and power! (Granting the Nobility any privilege after you click this mission will make the revolts more frequent, beware!)§!\n\nWe better have a proper military presence in all our provinces, this is going to get nasty..."
 koi_help_gaeldom_title: "Support Gaeldom"
 koi_help_gaeldom_desc: "No matter any individual Cat-sìths opinion on the Gaels, it is undeniable that the Tree of Life within their possesion is a powerful druidic landmark and a testament to Mother Nature's loving embrace. The fear of it falling into christian hands is a pervasive one, and there are many volunteers rallying and trying to beat their fear of water to reach Gaeldom and help them out militarily."
 koi_anarchy_aversion_title: "Avert Anarchy"
 koi_anarchy_aversion_desc: "Cats are naturally uncontrollable, no doubt about it, but the situation on the Isle has reached a breaking point. Nobody feels safe, nobody feels a strong connection to Mother Nature. We must go on a aggressive punitive campaign to restore faith and slow down clowder infighting. When it does slow down, we might be able to organize efforts to dig up lost and buried treasures, alongside gathering volunteers for a greater cause."
 koi_purrpose_title: "Our Purrpose in the World"
 koi_purrpose_desc: "We haven't been influenced by the Fae to stay on our tiny island and do nothing! The island is cold, sad and improper for such intelligent beings as us! The dominion of Mother Nature is vast and spread out, and many of us dream of a better home. Let the search begin!"
 koi_shiny_finds_title: "Shiny Finds"
 koi_shiny_finds_desc: "Sailing west has met us with a great loss of the few willing to go out into the great waters... At least we found a few uninhabited islands around Africa, we can land there just fine..."
 koi_successful_landing_title: "Successful Landings"
 koi_successful_landing_desc: "While the wound of losing a significant chunk of sailor cats in the west still hurts, our habitation programs of islands with no human presence has gone remarkably well. Maybe we need to go further, beyond Africa, to find what we are searching for. The one big island has grown significantly, perhaps it a scratching post for it's inhabitants."
 koi_priests_and_cats_desc: "The Gaels are our closest allies, perhaps the only druidic pagans more fervourous than we are. Let us open our Holy Groves to them, so the Druids of both species have a quiet space within Nature to exchange ideas, advice and discuss overcoming past differences in order to help us pull Isle of Catt from it's current shaky situation."
 koi_priests_and_cats_title: "Druids and Cats"
 koi_human_teachings_title: "Human Knowledge"
 koi_human_teachings_desc: "In order to burst out of backwardness and soar high like birds, we must entirely re-shuffle our primal thinking. After completing a massive defensive project, the Gaelic Druids deem us worthy of human education such as philosophy, extended agriculture and husbandry, mathematics, logistics and other topics to bounce us up to be respected by humanity. The Gaelic druids have demanded a price though, and that is the Cat-sìth revealing the secrets to entering Tír na nÓg."
 koi_capital_goods_title: "Long Term Production"
 koi_capital_goods_desc: "Now that we have realized our goals and purpose, we need to think long term. While currently, a few felines hunting for all kinds of seafood at the shore might be viable to feed the Cat-sìths, with most of the population sustaining itself by hunting for themselves, this is not sustainable for the long term. We need to produce something here, to sell or to eat, and free up a major chunk of our population to inhabitate distant lands or fill the ranks of our levies."
 koi_prepare_reform_title: "Prepare Reform"
 koi_prepare_reform_desc: "Now that we have significant breathing room from druidic paganism no longer being on the verge of being wiped out, we can look at internal reform. Despite Clowder murders going on a regular basis, the past few Cat-sìth have managed to pass through important social reforms. Now, the lower class merchants made up of less respected cat species made us a very, very special offer: 'We and the Druids will back your government in taking Emergency Powers to significantly weaken the land owning Cat-sìths, if you promise to scatter them forever.', and who are we to disagree on bringing forth progress?"
 koi_clowder_reform_title: "Purge the Landowners"
 koi_clowder_reform_desc: "The purge of society begins. We will either fail here and sink forever into irrelevancy, or we come out the other side, greater than ever. Feel no sympathy for the dead, for they chose their fight."
 prepare_reform_prov_check: "provinces in the world are Druidic!"
 koi_nobles_culled_check: "Has reformed our government!"
 koi_humans_or_not_title: "Objective of the State"
 koi_humans_or_not_desc: "Now that we have reformed into a country modeled after humanity, we have the capacity and education to focus on more than just finding a nice, shiny warm home for ourselves to nap all day on. One of the most prominent ideas, and thus conflicts, is about whether we continue aligning closer and closer to humanity, or if we desire to cement ourselves as equals to humanity without needing to cooperate."
 koi_humans_or_not_dummy_title: "Objective of the State"
 koi_humans_or_not_dummy_desc: "There is no way back now"
 koi_hire_levies_title: "Hire Cat-sìth Levies"
 koi_hire_levies_desc: "There are pawsitively alot of cats. All of them milling and running around, even the small isle is more dense than Europe's biggest cities. With the Cat-sìth taking control over vast territories, we could ask them to lend us some dedicated levies... for the defence of the Isle, obviously."
 koi_swipe_at_humanity_tt: "§M'Fortify Feline Outposts'§! government interaction will be §Gupgraded with -10% Development Cost in Primary Culture provinces!§!\n"
 koi_swipe_at_humanity_desc: "We have done it! Ever since we went to war with humans over resources, land to settle, over that precious, precious money, we are being recognized as a serious threat, potential ally, and maybe, even a great power? Oho, what a dream!\n\nBut with our more spontaneous wars, we have found most of the human population doesn't seem to want to move out and let us in for some reason? Simple! Homeowner has 'meow' in it, so it obviously belongs to the cat! Move in and stay till the humans get tired on their own.\n\nI'm sure nothing bad could occur from this." 
 koi_swipe_at_humanity_title: "Claw in their Side"
 koi_all_felines_gathered: "Enlighten all Cat species! (Currently you have [Root.KoiFelinesEnlightened.GetValue]/15!)"
 koi_feline_province_check: "Own at least 5 Cat species origin provinces!"
 koi_felinekind_unite_modifiers: "All our Cat related modifiers will be §Gmerged and empowered!§!"
 koi_unite_felinekind_title: "Unite the Scattered Cats"
 koi_unite_felinekind_desc: "All across the realm of Mother Nature, Cats have been threatened, their natural habitats cleared out and burned for human settlements. We say no more! Our operations to rescue and enlighten many of the worlds Cat species have gone well, and with enough economic might to have a serious sway over worlds political affairs, we say that humanity shall no longer trample on us or treat us as lesser!"
 koi_human_diplomats_tt: "Has at least 3 allies with §G100 trust§! and §G180 opinion§! of us."
 koi_human_diplomats_title: "Human Diplomats"
 koi_human_diplomats_desc: "The way we conduct diplomacy with humans thus far, which involves pushing things over and incessantly meowing, purring and rubbing against the legs of our human counterparts, does work to get our way. But we find that the sharp, silver tongue and aggressive tone of human negotiating tactics will help complete our diplomatic toolkit."
 koi_paws_and_hands_title: "Paws and Hands"
 koi_paws_and_hands_desc: "With the acquisition of more human subjects comes the responsibility of giving them roles. Humanity has seen our rise from a disfunctional society to something greater, a state to rival any other, and they have come to respect us for it. Humans no longer feel 'inferior' for being commanded by a 'lesser' species, but as a part of a greater collective. While human only living quarters exist in many of our provinces, most humans live, breathe and eat alongside their Fae-Cat counterparts. Is it time to harness their skills and physical features for our military?"
 koi_develop_cat_armor_desc: "Taking further inspiration from our human counterparts, we went looking at how they fight. One constant is that humans protect their soft, squishy flesh with plates of iron, chains, they use shields and more. We were always reliant on our swift evasion and melee combat with claws, which has worked when the opposing humans had huge, bulky spears or swords, but with the popularization of gunpowder weaponry, a cat can be reliably taken out from a significantly longer range than usual.\n\nThe armor will slow us down, won't protect us from the mighty thunderous hooves of human cavalry, but it will prevent many other lethal blows. Plus, it makes our soldiers look fancy."
 koi_develop_cat_armor_title: "Develop Cat Armor"
 koi_adapt_weaponry_title: "Adapt Weaponry"
 koi_adapt_weaponry_desc: "Screw the humans and their ability to have opposable thumbs! With enough engineering departments, dedicated focus to the military or even 'borrowing' modern designs and remaking them to be avaible for Cats, we will be able to get rid of the dependancy on opposable thumbs from many weapons, even if our solutions are... rather creative, to put it nicely."
 koi_develop_cat_armor_tt: "§GThis modifier can be toggled on and off via decision for a cost and with a cooldown.§!"
 koi_infiltration_tactics_title: "Deceitful Beings"
 koi_infiltration_tactics_desc: "Many of our brothers and sisters remain unenlightened to the ways of Mother Nature in other countries. It is a sad reality, but it grants us an excellent opportunity. Through propaganda campaigns or improving the standing of our state with other countries, we may begin infiltrating our agents into deeper parts of human society, and from there, any country within our paws would be at our mercy."
 koi_infiltration_tactics_tt: "§GUnlocks the 'Turn them Inside Out' covert action for ALL Cat culture nations.§!"
 koi_tail_end_of_the_world_title: "Tail End of the World"
 koi_tail_end_of_the_world_desc: "§OWarm. Oh so warm. So much warmth. I could stay here forever, leave me on the shore and i'll nap my head off-§!\n\nAhem, I mean, we have reached a possible final destination for our travels. Warm, relatively human free, plenty of space, and not as terrible as the vast jungles of other continents, what's there not to love? We must begin settling this landmass as fast as we can, before others see its natural beauty, and with it, begin trying to effectively administrate the more loose parts of our country."
 koi_expand_the_outposts_tt: "§YIsle of Catt§! gains a permanent claim on all §GCenters of Trade§! on the §YIndia§! and §YEast Indies§! subcontinets."
 koi_expand_mescarenes_pls_tt: "If one or multiple provinces in the §YMascarenes Area§! fulfill the mission requirements, we will get a §GCenter of Trade§! within the area."
 koi_expand_the_outposts_title: "Expand the Outposts"
 koi_expand_the_outposts_desc: "Newfound dreams of wealth of the common Cats are now a significant part representing our new state policy, but the connection to Mother Nature can never leave us. To prove our dedication, we will turn more places into beautiful Cat resorts, only outmatched by the Isle. Studying the ways of Venetian traders, these outposts will also serve as a 'string of pearls' leading us to other parts of Asia, giving us exclusive trading rights in many regions unenjoyed by other European powers."
 koi_whiskers_of_nature_title: "Whiskers of Nature"
 koi_whiskers_of_nature_desc: "Mother Nature feels our every step. The grass, the tall blades of wild, untamed grass are Her whiskers, the most direct way she communicates with us, tells us that we are taking good care of Her creations, letting us experience harmony with Her. And we are now able to give back.\n\nUnder the guidance of the Druids, we shall transform several of our provinces into full-time dedicated parks, intended as a spot free of any and all worries of the outside world, letting any and all visitors feel truly safe and at peace, no matter their background."
 koi_whiskers_of_nature_tt: "§MThis modifier will be applied to ALL eligable provinces held by us and our non-tributary subjects:§!"
 koi_perfect_foraging_title: "Perfect Foraging"
 koi_perfect_foraging_desc: "Mother Nature can often be hostile, and our enemies can use Her gifts to make our traversal many times more costly than it needs to be. Booby traps, misdirection, and not knowing the terrain to the smallest detail can result in far too many good Cats being killed early.\n\nOne interesting solution is doing as many great conquerors have done before: Get help from the local population, or integrate foreigners into our army. Humans are hesitant to work alongside us, which is a problem, but mercenaries are about as good as a professional army for our purposes. From them our armies will learn the mastery of surviving off of foreign land!"
 koi_perfect_foraging_tt: "§GUnlocks the Catt Skirmisher and Catt Cannon mercenary companies!§!"
 koi_move_to_australia_plsgetsydney: "\nIf we own the province of §Y[1090.GetName]§!, the event will target it and we will receive §Jaddition bonuses§! if we do choose to move to Australia."
 koi_upgrade_long_range_1_to_2: "\nUpgrades §YAttempts at Long Range Administration§! into §YDruidic Bureaucracy§!, adding:\n   Reduced Liberty Desire on other Continents: §G-5%§!\n   Liberty Desire from Subjects Development: §G-10%§!"
 koi_a_move_to_australia_title: "Move to Australia?"
 koi_a_move_to_australia_desc: "Scorching heat. Deadly critters. Natural beauty unworthy of those not following the lead of Mother Nature. We proved ourselves in the trial of traversing endless oceans, and we were rewarded. The question must be asked, do we move the center of our power away from the small Isle and into newly settled land? Access to Tír na nÓg is only semi-reliably possible from the Isle, and our actions could be seen as turning our tails on the Gods. To come so far yet fall short from doubt..."
 koi_seaborn_felines_desc: "Cats are still not too fond of water, we cannot really change that without spending generations upon generations trying to remove this innate fear. What we can do is start this process. Propaganda campaigns at home and within our subjects will be unleashed on the general Cat populace to recruit volunteers for experiments related to unrooting the deep-seated fear of water. Through this, we will hopefully gain enough willing Cats to expand our naval prowess, and if a magical cure to the fear is found, so be it."
 koi_seaborn_felines_title: "Seaborn Felines"
 koi_nonhuman_merchants_tt: "Use Advantageous Catt Manipulation abilities. §Y([Root.KoiUsedFawningButtons.GetValue]/10)§!"
 koi_worsteventeverwritten_tt: "Ten trade nodes where we have a merchant present will receive the following trade modifier:\n    Trade Node Power: §G20.0§!"
 koi_catt_merchants_beloved: "Beloved Catt Merchants"
 koi_nonhuman_merchants_title: "Pleasant to the Eye"
 koi_nonhuman_merchants_desc: "People love us! They cannot get enough of us. And we will exploit that to its fullest extent, using favorably negotiated trade deals to also secure exclusive trading rights in many regions within our operation."
 koi_hand_out_harsh_punishments_title: "Harsh Punishments"
 koi_hand_out_harsh_punishments_desc: "Curses! Curses! Curses! The Ivycurse was sent down to punish us for misbehaving! We nearly paid the greatest price a species can pay, near total extinction. We have become too relaxed with our worship, with letting other faiths pollute the truth! Hand out harsh punishments to evil-doers at once."
 koi_absolutist_or_rev_state_title: "A State of Beasts"
 koi_absolutist_or_rev_state_desc: "New ideas from within the heart of Germany flow freely across the globe, stirring up resentment against the ruling class for issues related to unjust treatment. What worries us more are the anti-theists threatening to kill and dismantle the natural order of Gods within the world. Shall we join these ideals or defend the old ways?"
 koi_east_or_west_tt: "§MAllows us to choose a modifier either benefiting long trade chains or one benefiting multiple localized trading hubs.§!"
 koi_east_or_west_focus_title: "The Greater Eastern Trade"
 koi_east_or_west_focus_desc: "We found ourselves able to reach out across the world and, through negotiation and conquest, establish a presence in the lands of spice and endless wealth. With this presence come problems on how to deal with it, we need to establish a coherent trading policy across our trade network about how to deal with the trade within the East."
 koi_spread_fairies_title: "Spread Fairies"
 koi_spread_fairies_desc: "With the power of our faith growing, it also grows the possibilities of what our druids are able to do, and there is a breakthrough which would allow us to spread the powers and populace of Fairies beyond the Gaelish Isles. With this increased presence, we could increase cooperation with the Seelie, and use the Unseelie against our enemies if they dare step on our soil. The owners of land surrounding the millenia old King's court will be given increased contribution from other Druidic countries to protect their land."
 koi_lessons_of_failinis_tt: "Enables the §RTrial against Failinis§!, where you'll be able to send any land leader out to challenge It for a cost. Either the land leader will come back completely remade with §Gextra pips and a unique trait§!, §Ror not at all§!."
 KoiFailinisExplain: "Win at least §Y50 Battles§! since this mission became avaible. (Currently §Y[Root.KoiFailinisBattlesWon.GetValue]§!)"
 koi_lessons_of_failinis_title: "Lessons of Failinis"
 koi_lessons_of_failinis_desc: "Failinis, the legendary dog belonging to Tuatha Dé Danann, holding dominion over all beasts and never losing a battle. That is something our generals must strive for in order for us to survive in the ever changing world of gunpowder weaponry and ever so cruel ways of snuffing out precious life. We will send willing generals over a month long campaign against Failinis, and if they survive, they'll come back better, reforged, vigorous enough to take down armies on their own."
 koi_shared_prosperity_title: "Shared Prosperity"
 koi_shared_prosperity_desc: "Gaeldom has conquered most of the Isles, safeguarding us permanently from European incursion. As a thank you, we will work harder than ever, interconnecting all our provinces with the goal of shared prosperity. For the Final Victory of Druidism on the Isles!"
 koi_farther_than_the_eye_can_see_title: "Farther than the Eye can see"
 koi_farther_than_the_eye_can_see_desc: "This is it. This is the point of no return. The Cat species has found and seen everything there has to be seen regarding what Mother Nature has to offer. Endless beauty is found everywhere, and it makes us feel pride for being Her followers. The islands in the middle of the Pacific Ocean would make for great outposts, so we can have worshippers and followers of Mother Nature all around the globe."
 koi_has_done_circumnavigation: "Has done a Circumnavigation of the World (First or After)"
 koi_upgrade_long_range_2_to_3: "\nUpgrades §YDruidic Bureaucracy§! into §Y17 Lessons of Long Range Control§!, adding:\n   Replaces Liberty Desire on other Continents\n   with Liberty Desire in Subjects: §G-15§!\n   Liberty Desire from Subjects Development: §G-10%§!\n   Monthly Autonomy Change: §G-0.025§!"
 koi_glas_gaibhnenn_spread_title: "Spread Glas Gaibhnenn"
 koi_glas_gaibhnenn_spread_desc: "Famines are still more common than they should be, and we will not bear this suffering anymore. Glas Gaibhhenn is a cow which is incredibly fertile and produces vast quantities of milk, which helps alleviate famine in certain areas, but she is a single cow, she can't handle an empire. That's why we will send her out to many barns prepared for cattle breeding, hoping she will pass on her blessing"
 koi_pawfect_society_title: "Pawrfect Society" 
 koi_pawfect_society_desc: "The Catts have reached their peak. Splendor and wealth is present around the globe, our influence undeniable. Centuries have passed since the enlightenment of our species, we have struggled through lows and highs, and in the end, came out greater than ever before. Let others envy what we have become!"

 has_no_manus_built_condensed: "§RHas no manufacturies built on the province.§!"
 employing_level_4_spymaster: "Spymaster of skill 4 or higher is currently being employed."

 #decisions
 koi_abduct_the_pallas_cat_title: "Enlighten the Manul Cat"
 koi_abduct_the_pallas_cat_desc: "This Cat is a survivor. The vast, cold steppes of central Asia are home to only the harshest willing to live in such conditions, and the Manul fits that title perfectly. Specialized as a night ambush predator, it is only about as large as a housecat, yet makes itself look bigger with its fur which protects it from the cold. These attributes will make them a nice addition to our society."
 koi_abduct_the_fishing_cat_title: "Enlighten the Fishing Cat"
 koi_abduct_the_fishing_cat_desc: "This Cat repulses me. Living all its life around wetlands close to rivers? How is it even a Cat? But their partially webbed paws and complete apathy towards water will make them a good target to enlighten with the teachings of Mother Nature."
 koi_abduct_the_egyptian_mau_title: "Enlighten the Egyptian Mau"
 koi_abduct_the_egyptian_mau_desc: "This Cat is a symbol. A symbol of a glorious past, where cats were not only treated as equals, they were often treated even better than the average human, being compared to Gods. What a dream that is! While they may not offer us much, and their treatment by the inhabitants of Egypt has been on the decline, especially with the Xizho incursion, we will still take them under our... wing? Paw? Leg? Whatever."
 koi_abduct_the_snow_leopard_desc: "A big Cat specialized at surviving the cold and being great at balancing itself on steep cliffs, despite our anxiety of watching them do so. They are rather antisocial, but we managed to track down enough individuals in one place to successfully bring home and enlighten."
 koi_abduct_the_snow_leopard_title: "Enlighten the Snow Leopard"
 koi_big_cat_counter: "§TWe have enlightened [Root.KoiBigCatsRescued.GetValue]/5 big Cat species so far!§!"
 koi_abduct_the_jaguar_title: "Enlighten the Jaguar"
 koi_abduct_the_jaguar_desc: "As we continue searching everywhere, uncovering everything that Mother Nature has blessed us with, we stumble onto some odd fellows. One such is the Jaguar, who shares similarities with some other big cats, yet their presence seems to be exclusive to the New World, specifically in jungles. Exploited by many human civilizations, we must enlighten these specimen at once!"
 koi_abduct_the_african_lion_title: "Enlighten the African Lion"
 koi_abduct_the_african_lion_desc: "African Lions are renowned as a symbol of bravery and strenght... For humanity at least, despite most humans who use the lion as a symbol never seeing one in their meager life. For us felines, they represent group organization, as they are the only non-enlightened cats who are social and willing to work together, with hierarchies and all. We shall enlighten and learn a lesson or two from them!"
 koi_abduct_the_amur_tiger_title: "Enlighten the Amur Tiger"
 koi_abduct_the_amur_tiger_desc: "Our search for big Cats resistant against all kinds of weather lead us to a peculiar sight. We read stories of big Cats in the far, far east where temperatures are cold enough to freeze boiling water within seconds and one caught our interest. The Amur Tiger, despite our expectations of it being a smaller size tiger due to it's habitat, was a complete beast. This big Cat could probably fight off bulls, horses and an army all on its own if it got angry enough! We need to enlighten them before they get heavily targetted for poaching!"
 koi_abduct_the_caucasian_leopard_title: "Enlighten the Caucasian Leopard"
 koi_abduct_the_caucasian_leopard_desc: "Remote, solitary and adapted to forested and mountainous areas, the Caucasian Leopard leaps forth to the center of our attention. We can't say that the everlasting Xhizo expansion led by the Prince of Antioch doesn't concern us even slightly, and the Caucasian Leopards proximity and experience with the terrain may come in handy... eventually. Let's enlighten them!"
 koi_abduct_the_caracal_desc: "This Cat is a demon. Have you heard the noises their offspring make? That should be indication enough to run away from the thought of enlightening them. Yet they are spread so far within so many dry deserts that we can't help ourselves but tango with fate. Mother Nature will hopefully fix them after we introduce them to Her."
 koi_abduct_the_caracal_title: "Enlighten the Caracal Cat"
 koi_abduct_the_chinese_mountain_cat_desc: "This Cat is a... what?\nWhen on the search for mythical or well known Cats across the Tibetan Plateau, within the high mountains, a curious specimen poked their head up at us within the middle of the night. No records we know of have documented this cat, and while it may not have anything special going for it, their elusivity must be noted. It is our duty to enlighten them with the teachings of Mother Nature!"
 koi_abduct_the_chinese_mountain_cat_title: "Enlighten the Chinese Mountain Cat"
 koi_abduct_the_abyssinian_cat_title: "Enlighten the Abyssinian Cat"
 koi_abduct_the_abyssinian_cat_desc: "This Cat is a dork. High energy and curious, more so than any other Cat we have witnessed, yet noone know the precise point of origin, as it has spread itself all across the Indian ocean. We want it done quickly, so taking some from the port of Zeila should do the job. I can extend my nap time if we enlighten this Cat, but who knows, maybe typing endless reports makes me bored enough to fall asleep quicker than if that boredom got taken away."
 koi_bay_cat_tt: "§TWe will unlock the Tropical City Planning Privilege!§!"
 koi_abduct_the_bay_cat_title: "Enlighten the Bay Cat"
 koi_abduct_the_bay_cat_desc: "This Cat is elusive. Reportedly staying in the deep, uninhabited tropical jungles of Borneo, preying on monkeys and whatever else gets within its claws. We do not trust the government of Lanfang to not try to hunt them down as a show of force, since they are one of our main competitiors in the East Indies, and as such, we must rescue and enlighten these Cats."
 koi_abduct_the_asiatic_cheetah_title: "Enlighten the Asiatic Cheetah"
 koi_abduct_the_asiatic_cheetah_desc: "This cat is-\nWhoa did you see it zoom past?"
 koi_abduct_the_bobcat_desc: "This Cat is adaptable. Members of the species are reported to be among all our North American settlements, especially concentrated on the West Coast. Enlightening this specimen and using their adaptability to spread them into lands beyond our control will make future conquest much, much easier."
 koi_abduct_the_bobcat_title: "Enlighten the Bobcat"
 koi_abduct_the_persian_cat_title: "Enlighten the Persian Cat"
 koi_abduct_the_persian_cat_desc: "This Cat has a funny face. Low energy lapcat, but due to its status as a luxurious and prestigious cat among humans, their presence may prove itself useful. Let us hope that they won't all get turned into rugs before we can enlighten some with Mother Natures teachings."
 koi_enable_feast_of_goibniu: "§GUnlocks the Feast of Goibniu decision for all non-Cat druidic countries, allowing them to immortalize their ruler!§!"
 koi_cats_liveninelives: "§VCats already live nine lives! That is enough!§!"
 koi_feast_of_goibniu_desc: "An envoy arrives at our court\nbringing an invitation forth,\na world beyond the veil,\nwhere Gods frolick and play.\n'Join us at the Feast' they tell,\nand when you do hear the bell,\ndo not tremble, do not fret,\nfor if your heart is pure, you have outplayed death."
 koi_feast_of_goibniu_title: "Partake in the Feast of Goibniu"
 koi_feast_of_goibniu_tt: "Our ruler is found to not have good intentions, and gets lost on the way."
 koi_first_unequip_tt: "§VThe first armor doctrine change won't penalize you!§!"
 koi_unequip_armor_decision_desc: "For one reason or another, we could decide to reverse our decision of providing standardized armor pieces for all our troops. It will force us to focus on evasion and speed tactics again, hoping the humans aim is bad enough as to not shoot our troops."
 koi_unequip_armor_decision_title: "Unequip Cat Armor"
 koi_equip_armor_decision_title: "Re-equip Cat Armor"
 koi_equip_armor_decision_desc: "I changed my mind, I want to look fancy again, and bullets really do hurt."
 koi_trial_against_failinis_decision_desc: "Send out one of our generals to a month long campaign against this creature, and learn everything we can from It. If the general dies, so be it, they volunteered knowing what they are up against."
 koi_trial_against_failinis_decision_title: "Trial against Failinis"
 KoiFailinisExplainDecision: "Win at least §Y25 Battles§!. (Currently §Y[Root.KoiFailinisBattlesWon.GetValue]§!)"
 koi_bathe_the_smelly_dog_title: "Bathe Failinis and turn the rivers into Wine?"
 koi_bathe_the_smelly_dog_desc: "The second, more uncanny and certainly less useful ability of Failinis is turning any running water it bathes in into wine. It could be used as a form of economic warfare, since we will be able to flood the ever so snobby wine market with never-before seen quantities of wine, crashing prices everywhere. To do this, we will need a general who already passed the Trials against Failinis, since they are the only ones skilled enough to lure our and survive this beast, then we will trap it in a river of our choosing."

