 theocatcy_tt_3: "Theo-catic Enterprise"
 theocat_tt: "Cosantóir"
 theocate_tt: "Cosantóirére"
 theocat_tt_empire: "Tiarna Cosantóir"
 theocate_tt_empire: "Tiarna Cosantóirére"
 theokit_tt: "If you are reading this, hi"
 blessed_theocatcy_reform: "Mercantile Feline Theo-catcy"
 blessed_theocatcy_reform_desc: "Ever since the Cat-sìths have been forcefully removed from positions of land ownership, the cats of the Isle have managed to build a functional state modeled after humaníty, but given even more emphasis on effective and decisive governance. The felines learned a very decisive lesson: Money makes the world go round, and shiny coins fit well on our paws."
 ability_catt_meows_and_purrs: "Advantageous Catt Manipulation Tactics"
 catt_druidic_convincing: "Spread our Practices"
 catt_druidic_convincing_desc: "Our religion and belief system is unique in the world, not just because we respect Nature, we actively protect Her. Let us spread our practices among those whose homes have been torn apart by conflict, forced relocation and natural disasters and show them that Nature is more than just a well of resources to leech from."
 catt_long_distance_purring: "Long Distance Purring"
 catt_long_distance_purring_desc: "Purring has always been a tool for the smaller cats to communicate different emotions, whether it is pain, fear or happiness. Surprisingly, that exact tool has proven disarming for interactions with humans. You purr at them while rubbing against their leg and they melt right into you. We must harness specific cats who have the most control over their purring and use them in trade negotiations, to get the most profitable deals imaginable."
 catt_towns_in_human_land: "Fortify Feline Outposts"
 catt_towns_in_human_land_desc: "Despite all our advancements and efforts to match up to human standarts, they will never treat us the same, as there are still undeniable physical differences between us. In order to make our scarce merchants and sailors feel safer in foreign lands, we shall spend effort on fortifying our foreign outposts."
 koi_hands_and_paws_reform: "Paws and Hands"
 koi_hands_and_paws_reform_desc: "Significant human presence is present across all our units, especially in the navy. But the bipedal apes opposable thumbs have found themselves useful in more fields than just replacing cats at sea."
 koi_fawning_explain_druidic_convincing_conversion: "All countries within our trade league will flip to our religion with their capital converting to druidism!"

 #diplomatic actions
 ia_koi_total_infiltration_title: "Turn them Inside Out"
 ia_koi_total_infiltration_desc: "We are everywhere. In your most prestigious palaces, in your kitchens, on the fields, in the barracks and none of you suspect a thing, keeping us around to 'hunt pests' for you. How would you deal with supplies disappearing, diplomatic negotiations sabotaged, merchants emberassed and making a mess of all your paperwork? With enough networks and communications established, we can begin causing chaos everywhere.\n\nInflicts a weaker version of §Rall covert actions§! at once, and lifts fog of war off the target for 5 years."
 ia_koi_total_infiltration_tooltip: "We snuck enough agents into the country, blending in with the local cat population, to start causing chaos."

