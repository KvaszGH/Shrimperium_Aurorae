 #Missions
 pap_chosen_magnate_tt: "We will promise the crown of Poland to our §Ychosen ally magnate§!. When the §RIndependence War§! begins, they will receive §Ycores§! on all of @[POL.GetTag] [POL.GetName]'s provinces and §Gbecome our vassal§!!"
 pap_magnate_conspiracy_title: "The Magnate Conspiracy"
 pap_magnate_conspiracy_desc: "The magnates of Poland have their eye on the throne; this is almost common knowledge. If we give them a nudge, and promise to crown a specific magnate as the new King of Poland..."
 pap_chosen_allies_tt: "We will make an offer to each of the countries meeting the §Ymission requirements§!; if they accept, they will join our §RIndependence War§!."
 pap_seek_foreign_support_title: "Seek Foreign Support"
 pap_seek_foreign_support_desc: "We need to seek backing among fellow Catholics who would be willing to support our independence from the Polish."
 pap_defy_the_queen_title: "Defy the Queen"
 pap_defy_the_queen_desc: "The Vicar of God cannot answer to any mortal, much less a woman! It is time to defy the Queen of Poland and make clear that the Curia is its own master, not a puppet to dance at her whims."
 pap_has_defied_queen_tt: "We have §Ydefied the summons to the Court of Poland§!!"
 pap_declare_independence_title: "Declare Independence"
 pap_declare_independence_desc: "It is time to call in all our favors and declare our independence from Poland!"
 pap_win_independence_title: "Win Independence"
 pap_win_independence_desc: "With our independence won, it is time to reward our allies and welcome our aligned Magnate to the fold!"
 pap_control_holy_orders_title: "Control Holy Orders"
 pap_control_holy_orders_desc: "We must regain the leadership of and regulatory power over the various Catholic Holy Orders. The Templar usurpation of our tradition authority in this domain must be reversed!"
 pap_holy_orders_estate_loyalty_and_influence_effects_tt: "The §YLoyalty§! and §YInfluence§! of the §YHoly Orders§! estate will no longer depend on opinion of the @[TEM.GetTag][TEM.GetName]. (Only for fellow §YCatholics§!!)"
 pap_consolidate_poland_title: "Consolidate Poland"
 pap_consolidate_poland_desc: "With Rome lost to the infidel, we must establish a new Kingdom of God in Poland."
 pap_align_the_baltics_title: "Align the Baltics"
 pap_align_the_baltics_desc: "Our new capital finds itself in the Baltics, a region still teeming with pagans. But among the pagans stands a fellow follower of the Catholic Faith: Riga. If we cooperate, surely the Baltics can find themselves under the proper stewardship of God."
 pap_established_winged_guard_title: "Establish Winged Guard"
 pap_established_winged_guard_desc: "Drawing upon the tradition of Winged Hussars in Poland, we shall create our own Winged Guard in the image of the Angelic Hosts to serve as the Arm of God."
 pap_expand_military_infrastructure_title: "Expand Military Infrastructure"
 pap_expand_military_infrastructure_desc: "Our Winged Guard need more recruits and horse breeding grounds! The Arm of God must grow ever stronger..."
 pap_power_of_the_holy_word_title: "Power of the Holy Word"
 pap_power_of_the_holy_word_desc: "The Arm of God stands indomitable! Enemies of the faith everywhere quail in despair as the Winged Guard crush all resistance!"
 pap_supremacy_tt: "Has §Ywon 30 wars§!. Current value: [Root.PapWins.GetValue] / 30"
 pap_supremacy_tt_2: "Has §Ywon 50 wars§!. Current value: [Root.PapWins.GetValue] / 50"
 pap_catholic_confraternity_title: "Catholic Confraternity"
 pap_catholic_confraternity_desc: "With the grievous division in the Catholic Church, it is more important than ever for Catholic nations to stick together."
 pap_lead_from_the_front_title: "Lead from the Front"
 pap_lead_from_the_front_desc: "With Christendom beset on all sides by heretics and heathens, the Holy Father must lead the hosts of the faithful personally!"
 pap_defend_christendom_title: "Defender of Christendom"
 pap_defend_christendom_desc: "We are God's Sword and Shield. The hosts of the faithful and the Winged Guard shall ensure the perpetual victory of the Faith!"
 pap_permanent_dotf_tt: "Other countries will be §Gunable to take the Defender of the Faith§! position from us. If we ever lose the position, we will §Gre-acquire it§! within a year!"
 pap_permanent_curia_tt: "We will §Gperpetually maintain control of the Curia§!!"
 pap_true_voice_of_god_title: "§JTrue Voice of God§!"
 pap_true_voice_of_god_desc: "There cannot be any doubt. The true Voice of God is none other than the Holy Father, and not any Jeannist fraud!"
 pap_polish_agriculture_title: "Polish Agriculture"
 pap_polish_agriculture_desc: "The faithful need to be fed. The Church must ensure that none of the Flock starve!"
 pap_agricultural_fields_tt: "Every province meeting the §Ymission requirements§! will gain the following modifier:"
 pap_cossacks_title: "Appeal to the Cossacks"
 pap_cossacks_desc: "The Cossacks come in every flavor on the steppes, but one thing they all share in common is an approximate devotion to Christianity. We must take advantage of this piety to sway them to our cause."
 pap_cathedral_heist_reqs_tt: "A §YCatholic§! country with at least one §Yport in Italy§! must have at least §G+150 opinion§! of us!"
 pap_cathedral_heist_title: "St. Peter's Heist"
 pap_cathedral_heist_desc: "The Basilica of St. Peter, and all the holy relics stored in it, have fallen into the hands of the infidel Demon Prince. This cannot stand! We must prepare a mission to liberate the entire Basilica from their unholy grasp."
 pap_holy_seat_danzig_title: "Holy Seat of Danzig"
 pap_holy_seat_danzig_desc: "We must come to terms with the loss of the city of Rome. With the Archbasilica now rebuilt in Danzig, we can re-establish the heart of Christendom in our new homeland."
 pap_amber_icons_title: "Carved in Amber"
 pap_amber_icons_desc: "The Baltics produce almost all the amber of Europe. We could take advantage of this near-monopoly on amber to produce relics and icons carved in amber to be carried by the faithful and possibly even installed into weapons to imbue them with blessings."
 pap_amber_icons_industry_tt: "Icons of Amber"
 unlocks_gospel_of_bullets_tt: "Unlocks the §PGospel of Bullets§!"
 gospel_of_bullets_unlocked_flag: "Unlocked Gospel of Bullets"
 pap_etched_weaponry_title: "Blessed Armaments"
 pap_etched_weaponry_desc: "By embedding small holy icons in the weapons and uniforms of our army, we may confer the blessings of God upon all our soldiers and activate these blessings at a suitable moment to greatly empower their combat capabilities."
 pap_religion_as_science_title: "Religion as a Science"
 pap_religion_as_science_desc: "Saint Augustine once said, 'All knowledge leads to God.' In these trying times, when faith wavers and the world falls to heresy and desolation, it is more important than ever to gain knowledge and put it to the service of the Faith. We must understand how to most effectively empower God with our devotion, and likewise which prayers receive the most potent blessings in return."
 pap_divine_gears_title: "The Divine Machine"
 pap_divine_gears_desc: "The Flesh is Weak, but the Machine knows God's Will and will serve it without temptation."
 pap_unlocks_coal_tt: "We will §Yunlock Coal§! if we haven't already."
 pap_unlock_railroads_tt: "We will develop an §Ginnovative new technology§!: §YRailroads§!. (Build them using a §YState Edict§! and §YDecision§!.)"
 pap_deus_ex_machina_title: "§YDeus Ex Machina§!"
 pap_deus_ex_machina_desc: "The smoke of God's Machines will blot out the sky! No challenge is too great for our faith and machines to overcome."
 pap_railroad_building_edict: "Railroad Construction"
 pap_indomitable_pope_title: "The Pope Indomitable"
 pap_indomitable_pope_desc: "With a solid demesne in Poland, allies in Christendom, and holy orders under our command, the Papacy can be sure that its past as a puppet is behind it. Nevermore shall a Pope dance to a temporal ruler's tune!"
 unlocks_papal_abdication_tt: "We will be able to §Rforce the abdication§! of Popes under foreign sway!"
 pap_mend_catholic_schism_title: "End the Antipapacy"
 pap_mend_catholic_schism_desc: "No more can we tolerate the existence of an Antipope under the control of powerhungry rulers. We must mend the Catholic Church and remove all questions as to our legitimacy!"
 pap_mend_orthodox_schism_title: "Mend the Great Schism"
 pap_mend_orthodox_schism_desc: "The ancient Schism where the Patriarch of Constantinople started the so-called Orthodox heresy has lasted too long. It is time to bring them back to the fold."
 pap_mend_templarite_schism_title: "Castigate the Templarites"
 pap_mend_templarite_schism_desc: "The upstart Templarites and their false angel must be taught a lesson!"
 pap_one_and_true_title: "§MOne and True§!"
 pap_one_and_true_desc: "God's Will Be Done!"
 pap_castigated_templars_tt: "We have defeated @[TEM.GetTag][TEM.GetName] in a war where we are both primary war leaders, and inflicted 100k casualties against them in the process."
 pap_castigated_valencia_tt: "We have defeated @[VAL.GetTag][VAL.GetName] in a war where we are both primary war leaders, and inflicted 100k casualties against them in the process."
 
 # events
 capital_autonomy.2.t: "Proximity Calculator Event"
 ia_flavor_pap.1.t: "Succession of Wislawa Piast"
 ia_flavor_pap.1.d: "After the death of Kazimierz V, great-grandson of the legendary Kazimierz III the Great, the Kingdom of Poland was once again left in a perilous succession. Just like his namesake great-grandfather, Kazimierz had left no male issue; unlike his legendary namesake, he did not have maternal grandsons to adopt into the dynasty, with his only daughter Wislawa also only having a daughter of her own. Hoping to avoid fragmentation of the Kingdom between rival Piast dukes and possibly due to not wishing his daughter to become a mere marriage pawn, he had raised her as his primary heir and made her position clear to all in the realm, including the Pope in Danzig, who he hoped would crown her, making her legitimacy unquestionable. Unfortunately for his plans, after his death the Pope Urbanus Jagiellon refused to crown a woman, and Wislawa had to make do with the Archbishop of Krakow and disloyal vassals eyeing the throne all around. Her position was even more tenuous in Hungary, where numerous nobles rallied around Janos Hunyadi as a potential king to make them independent from Poland. Only Janos's own ambivalence towards accepting the crown of Hungary so far has kept it in the hands of Wislawa."
 ia_flavor_pap.1.a: "The situation is precarious..."
 pap_if_they_accept_tt: "If they accept, the following effects will apply:\n"
 pap_riga_deal: "Papacy-Riga Deal"
 ia_flavor_pap.2.t: "Deal with Riga"
 ia_flavor_pap.2.d: "Though Riga may be a fellow theocracy, their priests have an unusually strong interest in matters of commerce. A promise of exclusive trade access in our major port is sure to sway them to our side."
 ia_flavor_pap.2.a: "Send the offer!"
 ia_flavor_pap.2.b: "This is not needed."
 ia_flavor_pap.3.t: "Offer from the Papacy"
 ia_flavor_pap.3.d: "In exchange for our support in gaining independence from Poland, the Papacy is offering us exclusive trade access to the port of Danzig. Shall we accept their offer?"
 ia_flavor_pap.3.a: "Deal!"
 ia_flavor_pap.3.b: "We do not need this."
 ia_flavor_pap.4.t: "Deal with Denmark"
 ia_flavor_pap.4.d: "The Kingdom of Denmark has long held ambitions of uniting Scandinavia under one crown. If we were to 'discover' historical claims in our Papal archives justifying their claims on the thrones of Sweden and Norway, surely Denmark would come to our aid."
 ia_flavor_pap.4.a: "Send the offer!"
 ia_flavor_pap.4.b: "This is not needed."
 ia_flavor_pap.5.t: "Offer from the Papacy"
 ia_flavor_pap.5.d: "In exchange for our support in gaining independence from Poland, the Papacy is offering us justified claims upon the crowns of Sweden and Norway. Shall we accept their offer?"
 ia_flavor_pap.5.a: "Deal!"
 ia_flavor_pap.5.b: "We do not need this."
 ia_flavor_pap.6.t: "Deal with Neustria"
 ia_flavor_pap.6.d: "The Merovingians of Neustria have long held ambitions of regaining the Kingdom of France. If we were to bless their rulers and guarantee them various privileges in the Curia, surely Neustria would come to our aid."
 ia_flavor_pap.6.a: "Send the offer!"
 ia_flavor_pap.6.b: "This is not needed."
 ia_flavor_pap.7.t: "Offer from the Papacy"
 ia_flavor_pap.7.d: "In exchange for our support in gaining independence from Poland, the Papacy is offering us a blessing for our ruler and major privileges in the Curia. Shall we accept their offer?"
 ia_flavor_pap.7.a: "Deal!"
 ia_flavor_pap.7.b: "We do not need this."
 ia_flavor_pap.9.t: "Papal Presence at Court"
 ia_flavor_pap.9.d: "Ever since the coronation of [Root.Monarch.GetName], at which the Pope was conspicuously absent, his Holiness has not once set foot in the court of Poland. Though we all but control the College of Cardinals, this defiance from the Pope will only embolden foreign powers hostile towards us. We must demand that the Pope formally pay homage to the lawful sovereign of Poland, so that the world knows who truly controls the Church!"
 ia_flavor_pap.9.a: "Summon the Pope to court!"
 ia_flavor_pap.9.b: "Let us not upset the status quo."
 ia_flavor_pap.10.t: "Summoned to the Polish Court"
 ia_flavor_pap.10.d: "The ruler of Poland, [POL.Monarch.GetName], has sent us an outrageous demand! We have been summoned to formally pay homage at the court of Poland, which would relegate the Vicar of God to the status of vassal of a temporal ruler."
 ia_flavor_pap.10.a: "We defy this temporal tyrant!"
 ia_flavor_pap.10.b: "We have no choice..."
 ia_flavor_pap.11.t: "Cleansing of the Curia"
 ia_flavor_pap.11.d: "There is no escaping the issue any longer. The Curia is corrupted! Cardinals answer to temporal rulers, scheme for influence in the College, and seek to render the Most Holy Vicar of God into a mere puppet of mortal politics.\n In times like these, hard choices must be made. For instance, during a session of the College of Cardinals, the difficult choice may be made to lock them in and set the building aflame. God will know His own.\n Finally, the root instigator of the corruption in the Curia must be dealt with."
 ia_flavor_pap.11.a: "Excommunicatio!"
 ia_flavor_pap.13.t: "Operation Archbasilica"
 ia_flavor_pap.13.d: "Under the flag of a Danish merchant guild, our special Inquisitorial unit sailed around Iberia and into a friendly Italian port. With support from local Catholics, we were able to approach the city of Rome without detection, whereupon we used the secret tunnels known only to a select few in the Curia to enter the city under cover of night. Pretending to be labourers hired for a construction project, the city guard paid us no heed as we snuck into Saint Peter's Basilica. O, the desecration this most holy place has been subjected to! Odd pieces of paper with strange symbols plastered onto holy relics, statues defaced and crosses torn down. But with our tools personally blessed by the Pope and strength born from our conviction, we were able to dismantle the Dome and extract countless holy artifacts from what used to be the Archbasilica. With relics and foundations stones in hand and the former Basilica left in ruins, we left again the city ere dawn and fled back to our fleet."
 ia_flavor_pap.13.a: "For the glory of God!"
 ia_flavor_pap.14.t: "Simon Manus, Controversial Alchemist"
 ia_flavor_pap.14.d: "The practice of Alchemy is dominated by the Daoists and has generally been frowned upon and often outright suppressed in Christendom. However, recently with the increasingly scientification of faith in the Catholic Church, a small community of radical alchemists have formed amongst them who believe that greater divine power can be accrused not merely through regular prayer of the faithful but by administering 'drugs of zeal' to inspire more powerful faith and thus more effective prayer. Their leader, Simon Manus, has recently been lobbying for Papal approval to test this hypothesis on large numbers of human test subjects, promising in exchange to provide the full extent of the alchemists' scientific knowledge to our other research efforts."
  ia_flavor_pap.14.a: "What could possibly go wrong?"
  ia_flavor_pap.14.b: "Shut this lunatic down RIGHT NOW."