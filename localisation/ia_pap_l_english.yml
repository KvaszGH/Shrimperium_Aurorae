 ia_angelize_winged_guard: "Angelize!"
 ia_angelize_winged_guard_desc: "An extreme concentration of Divine Energy allows the Archangel Michael to manifest a physical form in the mortal world, and temporarily angelize the soldiers under his command."
 ia_faith_tithe: "Tithe of Faith"
 ia_faith_tithe_desc: "A material demonstration of Faith is an amazing source of Divine Energy."
 ia_gospel_of_bullets: "Gospel of Bullets"
 ia_gospel_of_bullets_desc: "A massive wave of Divine Energy released at once across our entire army will activate the Blessings etched into every gun issued to the warriors of God. Let our enemies quail in the face of the Gospel of Bullets!"
 PAP_PERMA_DOTF_TT: "The §YPapacy§! is §Gpermanently§! §YDefender of the Faith!§!"
 transfer_soldiers_to_navy: "Transfer Soldiers to the Navy"
 transfer_soldiers_to_navy_desc: "Our navy could use more sailors. Let us transfer them from the Army, where they are not needed."
 equip_marines_interaction: "Equip Marines"
 equip_marines_interaction_desc: "We must equip our marines with the best gear available so they can serve as the vanguard of our forces."
 boost_naval_professionalism: "Boost Naval Professionalism"
 boost_naval_professionalism_desc: "Invest State Resources into the Professionalism of our Navy and Marines"
 
 PAP_winged_guard: "Establish the Winged Guard"
 PAP_winged_guard_desc: "Angelic Visage, Winged Death. The Angels of Death shall bring doom upon the enemies of God!"
 PAP_ia_kingdom_of_god: "Kingdom of God"
 PAP_ia_kingdom_of_god_desc: "The world has fallen to heresy, fanaticism, and collective insanity. It is up to the only true Vicar of God to restore Faith and Reason in the Kingdom of God."
 PAP_ia_restore_vatican_library: "Biblioteca Apostolica Vaticana"
 PAP_ia_restore_vatican_library_desc: "To understand God's Creation is to be closer to God. Only with the knowledge of the world gathered can we even begin to fathom His plans."
 stpeters_cathedral_clone: "Archbasilica of Saint Peter"
 has_production_manufactory_trigger_tooltip: "Has a §YProduction Manufactory§!."
 divine_machinery: "The Divine Machine"
 divine_machinery_desc: "The perfect machine runs like clockwork, day and night, untiring, unceasing, implacable. Just as the machines in our factories perform God's will, so shall our bureaucracy and economy also run like divine clockwork, as the entire Kingdom of God is one great Divine Machine."
 railroad_creation_decision_title: "Construct Railroads"
 railroad_creation_decision_desc: "We will begin construction railroads in the state with the appropriate §YState Edict§!."
 papal_abdication_decision_title: "Papal Abdication"
 papal_abdication_decision_desc: "The Pope cannot have foreign loyalties. By God's Will, an abdication is demanded!"
 
