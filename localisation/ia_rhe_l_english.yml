 ia_rheinland_nighttime_work_title: "Nighttime Work"
 ia_rheinland_nighttime_work_desc: "As coal burns bright, it is able to illuminate any room better than any candle, fireplace or even moonlight. By developing ways to lead out the smoke, we are able to burn coal and continue work even during nighttime with little interference. From now on, working will be organized into two halves, with one half of workers assigned to work for 12 hours, then the other half for 12 hours, endlessly repeating like a machine. Criminals are sent to work on Sabbaths and rest days while our workers recover to keep our productivity up. The German King might not like our approach, as it means our yearly census contains less non-working serfs who are able to be sent into their armies under the guise of "protecting the lands of Germany and the natural order of Feudalism", but who cares what they think anyway?"
 ia_rheinland_endlos_feuerschein_title: "Endlos Feuerschein"
 ia_rheinland_endlos_feuerschein_desc: "To exploit coal to the fullest, we had begun slowly replacing wood with it in all our production centers. Problem is that coal is still oftentimes too expensive and unreliable to transport en masse due to sparks having the potential to create an unstoppable fire, which often halts production as many industrialists don't think the cost or rish is worth the effort. To solve this, we will take the residue left behind by coal and charcoal and process it into briquettes, which are able to be easily and reliably stored in times of shortages or emergencies, while being affordable to even common peoples. We are using coal as efficiently as we can, and production will never halt even under the worst of conditions."
