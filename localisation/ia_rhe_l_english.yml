 rhe_prospect_for_coal_decision_title: "Prospect for Coal Deposits"
 rhe_prospect_for_coal_decision_desc: "Our government sees great potential in coal, as it burns brighter and longer than wood, but for now, we have to extensively justify replacing a provinces produce with it, as the demand for it is low due to lacking the ability to fully utilize its potential."
